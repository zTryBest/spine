id: fix
version: 10
name: Fix
intent: Fix a bug or make a small, lightweight change. Use when the change is well understood and low risk (including urgent production fixes) and does not need a full design phase. Still keeps a lean OpenSpec proposal as the record and the board's data source.
start: inspect

states:
  - id: inspect
    goal: Understand the issue and capture a lean OpenSpec proposal.
    forbid: [write-source]
    capabilities:
      - { id: systematic-debugging, required: true }
      - { id: openspec-propose, required: true }
    rules:
      - Write workflow-authored documents and Markdown artifacts in the same language as the user's original request, unless the user explicitly asks for another language. Preserve code identifiers, command names, paths, API names, and upstream skill names verbatim.
      - To understand the bug and its blast radius in the existing code, prefer the codegraph MCP tool `codegraph_explore` (run `codegraph init` once if the graph is missing) over blind grep/glob/Read. Fall back to normal search if codegraph is unavailable.
      - Keep the OpenSpec proposal lean — a short proposal.md describing what is broken and the intended fix. Skip design.md and detailed tasks/specs for a small change; the spec is a fast record and the board's data source, not a heavy artifact.
    needs: [issue_understood, proposal_ready]
    next: fix

  - id: fix
    goal: Apply the minimal patch.
    capabilities:
      - { id: executing-plans, required: true }
    needs: [patched]
    next: verify

  - id: verify
    goal: Run focused verification.
    capabilities:
      - { id: verification-before-completion, required: true }
    needs: [verify_result=pass]
    fail_when: verify_result=fail
    fail_to: fix
    fail_reason: Verification did not pass.
    terminal: true
