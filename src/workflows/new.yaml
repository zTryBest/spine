id: new
version: 10
name: New Project
intent: Build a project from scratch (0 to 1). Use when there is no existing codebase and the work includes scaffolding the initial skeleton before implementation.
start: brainstorm

states:
  - id: brainstorm
    goal: Explore the product direction, unknowns, constraints, and viable approaches before creating artifacts.
    forbid: [write-source]
    capabilities: [brainstorming]
    rules:
      - Use brainstorming before OpenSpec so the proposal captures explored options, tradeoffs, and unresolved questions.
    needs: [brainstorming_done]
    next: openspec

  - id: openspec
    goal: Create OpenSpec artifacts from the brainstormed direction.
    forbid: [write-source]
    capabilities: [openspec-propose]
    needs: [proposal_ready]
    next: design

  - id: design
    goal: Turn the OpenSpec artifacts into a concrete implementation design and get user confirmation.
    forbid: [write-source]
    requires_user: true
    capabilities: [writing-plans]
    rules:
      - Use writing-plans to document the implementation design, task breakdown, and verification approach before build starts.
      - Run writing-plans in a subagent (the Task tool) using file handoff only. Pass artifact paths, not file contents; do not inline proposal.md, tasks.md, specs, or other OpenSpec artifact contents into the prompt.
      - Handoff inputs are openspec/changes/{change}/proposal.md, openspec/changes/{change}/tasks.md, and openspec/changes/{change}/specs/**/*.md. The subagent should read only the files it needs.
      - Keep the output compatible with Superpowers by writing the plan to docs/superpowers/plans/{change}.md. The main agent should bring back only the plan path, a concise summary, and any blockers, then ask the user to confirm.
    needs: [design_documented, design_confirmed]
    next: build

  - id: build
    goal: Scaffold and implement the initial project from the confirmed design.
    capabilities: [executing-plans, subagent-driven-development]
    rules:
      - Choose exactly one implementation skill before editing source. Use executing-plans for small, local, mostly sequential implementation work. Use subagent-driven-development when the build can be split across independent modules, needs parallel agents, or benefits from isolated implementer/reviewer/fixer context.
    needs: [implemented]
    next: review

  - id: review
    goal: Review implementation and company standards.
    capabilities: [requesting-code-review]
    needs: [review_result=pass]
    fail_when: review_result=fail
    fail_to: build
    fail_reason: Review found implementation problems.
    next: verify

  - id: verify
    goal: Verify behavior and OpenSpec coverage.
    capabilities: [verification-before-completion, openspec-verify-change]
    needs: [verify_result=pass]
    fail_when: verify_result=fail
    fail_to: build
    fail_reason: Verification did not pass.
    terminal: true
