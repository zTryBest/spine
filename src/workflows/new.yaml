id: new
version: 21
name: New Project
intent: Build a project from scratch (0 to 1). Use when there is no existing codebase and the work needs a real scaffold before requirements, OpenSpec, design, and implementation documents are written.
start: scaffold

states:
  - id: scaffold
    goal: Decide the project identity and backend scaffold first, pull the skeleton if needed, and record the real component/directory facts before any brainstorming or OpenSpec documents are written.
    capabilities:
      - { id: scaffold-aries-cli, group: backend, when: the project needs a backend service }
      - { id: scaffold-starfish-initializr, group: backend, when: the project needs a backend service }
    rules:
      - Before running brainstorming or writing OpenSpec artifacts, ask only the minimum scaffold inputs needed from the user, including whether a backend service is needed, which backend scaffold/company standard applies, and the component identifier/project directory to use.
      - scaffold-aries-cli and scaffold-starfish-initializr are BOTH backend scaffolds. When a backend is needed, pick exactly one that matches the required framework/company standard and run it; do not run both, and do not hand-write the skeleton.
      - There is no frontend scaffold. A frontend, if any, is not scaffolded here - it is built in the build stage with the hui-pro UI component library. A frontend-only project pulls no scaffold and simply moves on.
      - Do not initialize or require codegraph for the freshly pulled scaffold. For a new skeleton, inspect only the directory tree, file names, build files, package/module names, and lightweight `rg` searches; there is little business code yet, and grep/tree context is more reliable here.
      - Record the build metadata to `.hikspine/project-build.json` shaped as project plus a components array, where each component entry has component (component identifier), svn (SVN URL), and optional module, buildType, and artifact fields. Append or update one entry in components for each pulled scaffold, and keep this file the single source of truth - the board displays it and the later SVN build/packaging (hido) stage reads it.
    needs: [scaffolded]
    next: brainstorm

  - id: brainstorm
    goal: Explore the product direction, unknowns, constraints, and viable approaches after the real scaffold/component facts are known, before creating OpenSpec artifacts.
    forbid: [write-source]
    capabilities:
      - { id: brainstorming, required: true }
    rules:
      - Write workflow-authored documents and Markdown artifacts in the same language as the user's original request, unless the user explicitly asks for another language. Preserve code identifiers, command names, paths, API names, and upstream skill names verbatim.
      - Use brainstorming before OpenSpec so the proposal captures explored options, tradeoffs, and unresolved questions.
      - Ground brainstorming in the scaffold that already exists. Read `.hikspine/project-build.json` and inspect the directory tree/build files first; do not invent project directories, package names, or component identifiers from the feature/change name.
    needs: [brainstorming_done]
    next: openspec

  - id: openspec
    goal: Create OpenSpec artifacts from the brainstormed direction and the real scaffold facts.
    forbid: [write-source]
    capabilities:
      - { id: openspec-propose, required: true }
    rules:
      - Write workflow-authored documents and Markdown artifacts in the same language as the user's original request, unless the user explicitly asks for another language. Preserve code identifiers, command names, paths, API names, and upstream skill names verbatim.
      - Base OpenSpec names and examples on `.hikspine/project-build.json` and the actual scaffold directories. The change/spec name may describe the product capability, but component identifiers, package names, and paths must come from the scaffold facts.
    needs: [proposal_ready]
    next: design

  - id: design
    goal: Turn the OpenSpec artifacts into a concrete implementation design and get user confirmation.
    forbid: [write-source]
    requires_user: true
    capabilities:
      - { id: writing-plans, required: true }
    rules:
      - Write workflow-authored documents and Markdown artifacts in the same language as the user's original request, unless the user explicitly asks for another language. Preserve code identifiers, command names, paths, API names, and upstream skill names verbatim.
      - Use writing-plans to document the implementation design, task breakdown, and verification approach before build starts.
      - Ground the design in the scaffolded code with lightweight context only. Read `.hikspine/project-build.json`, list the directory tree, inspect build/config files, package/module names, and use targeted `rg` searches. Do not require codegraph for the new skeleton context.
      - In the main context, do not Read proposal.md, tasks.md, design.md, or specs before dispatching planning subagents. Only list or test artifact paths, then pass paths.
      - Run writing-plans in subagents (the Task tool) using file handoff only. Pass artifact paths, not file contents; do not inline proposal.md, tasks.md, specs, design.md, or OpenSpec summaries into the prompt.
      - Single-plan handoff inputs are openspec/changes/{change}/proposal.md, openspec/changes/{change}/tasks.md, optional openspec/changes/{change}/design.md, and openspec/changes/{change}/specs/**/*.md. The subagent should read only the files it needs and write docs/superpowers/plans/{change}.md.
      - If specs/**/*.md has more than one file, or tasks.md has more than 6 task groups, shard the plan by dispatching one writing-plans subagent per spec, passing proposal.md, tasks.md, optional design.md, and exactly one specs/{spec-id}/spec.md path. Each child plan writes docs/superpowers/plans/{change}-{spec-id}.md.
      - Dispatch at most 3 writing-plans subagents concurrently (company concurrency limit). If there are more shards than that, run them in batches of 3 and wait for each batch to finish before starting the next, so subagents do not time out.
      - After sharded child plans exist, create a concise manifest at docs/superpowers/plans/{change}.md that links child plans, states execution order, shared contracts, and integration verification. Do not duplicate child implementation steps in the manifest.
      - The main agent should bring back only the manifest or plan path, child plan paths when sharded, a concise summary, and any blockers, then ask the user to confirm.
      - While getting confirmation, also ask the user whether to enable TDD mode (test-driven-development) for the build. Record the answer as the tdd_mode decision - run `decide tdd_mode true` or `decide tdd_mode false` - the build stage reads it.
    needs: [design_documented, tdd_mode, design_confirmed]
    next: build

  - id: build
    goal: Implement the initial project on top of the scaffolded skeleton, following the confirmed design.
    capabilities:
      - { id: executing-plans, group: driver }
      - { id: subagent-driven-development, group: driver }
      - { id: test-driven-development, when: the tdd_mode decision from design is true }
      - { id: hui-pro, when: building any frontend UI component }
    rules:
      - Execution driver - pick exactly ONE. Use executing-plans for small, local, mostly sequential work. Use subagent-driven-development when the build can be split across independent modules, needs parallel agents, or benefits from isolated implementer/reviewer/fixer context.
      - When the tdd_mode decision recorded in design is true (see the `decisions` field of the next output), the implementation MUST follow test-driven-development - load that skill and write a failing test before the code, whether you drive with executing-plans or subagent-driven-development. When tdd_mode is false, implement normally without it.
      - When using subagent-driven-development, run at most 3 implementer subagents concurrently (company concurrency limit); split extra modules into batches of 3 and wait for each batch before starting the next, so subagents do not time out.
      - Do NOT depend on git worktree isolation for parallel subagents. Agent worktrees require the Claude Code session itself to have been launched inside a git repository; a freshly scaffolded project is usually not that, and running `git init` in the project does not fix it when the session root differs (you will get "Cannot create agent worktree: not in a git repository"). Dispatch parallel implementers WITHOUT worktree isolation, giving each a disjoint set of files/modules so they cannot conflict. If a worktree-isolated dispatch errors, immediately retry that same dispatch without isolation instead of stopping; if disjoint file ownership is not possible, run the implementers sequentially.
      - When using subagent-driven-development bundled helper scripts, invoke the exact script files documented by that skill, such as `scripts/task-brief` and `scripts/review-package`; do not append `.mjs` or run them with `node` unless the actual script file has that extension.
      - Frontend UI is MANDATORY for any UI component. Whenever you write frontend UI, you MUST load and use the hui-pro skill to build the components; do not hand-write components or use another UI library. This is IN ADDITION to the execution driver, not a replacement. There is no frontend scaffold - hui-pro is the only sanctioned way to produce UI.
      - A subagent only sees what its brief contains - build rules do NOT reach it automatically. When using subagent-driven-development, write the applicable per-task requirements into each subagent brief. If the subagent will touch frontend UI, require it to load and use hui-pro for the components; if the tdd_mode decision is true, require it to follow test-driven-development (a failing test before the code). Restate these in every relevant subagent brief, not just once in the main context.
      - The skeleton was already scaffolded before brainstorming. Before modifying code, use `.hikspine/project-build.json`, directory listings, build/config files, package/module names, and targeted `rg` searches to locate the right files. Do not re-run scaffold and do not require codegraph for this new-skeleton context.
    needs: [implemented]
    next: review

  - id: review
    goal: Review implementation and company standards.
    capabilities:
      - { id: requesting-code-review, required: true }
    needs: [review_result=pass]
    fail_when: review_result=fail
    fail_to: build
    fail_reason: Review found implementation problems.
    next: verify

  - id: verify
    goal: Verify behavior and OpenSpec coverage.
    capabilities:
      - { id: verification-before-completion, required: true }
      - { id: openspec-verify-change, required: true }
    needs: [verify_result=pass]
    fail_when: verify_result=fail
    fail_to: build
    fail_reason: Verification did not pass.
    next: archive

  - id: archive
    goal: Archive the completed change after user confirmation.
    forbid: [write-source]
    requires_user: true
    capabilities:
      - { id: openspec-archive-change, required: true }
    needs: [archived]
    next: hido

  - id: hido
    goal: Run the SVN build/packaging step after asking the user to confirm whether to build.
    forbid: [write-source]
    requires_user: true
    capabilities:
      - { id: custom-component-creator, required: true }
    rules:
      - Read `.hikspine/project-build.json` (written in the scaffold stage) to get each component's component identifier and SVN address; drive the SVN build/packaging from those recorded values instead of asking the user to re-supply them. If the file is missing or a component is absent, ask the user before building.
    terminal: true
