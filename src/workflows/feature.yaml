id: feature
version: 17
name: Feature Development
intent: Build a new feature or non-trivial change in an existing project. Use when the work needs requirements clarification, a design, and OpenSpec artifacts before implementation.
start: open

# States + decision-driven transitions. `needs` are skill-agnostic decisions the
# agent records; `capabilities` are skills it may compose to reach them. Swapping
# or adding a skill means editing a capability list — the transitions are unchanged.
states:
  - id: open
    goal: Clarify the change and create OpenSpec artifacts.
    forbid: [write-source]
    capabilities:
      - { id: openspec-explore, required: true }
      - { id: openspec-propose, required: true }
    rules:
      - Write workflow-authored documents and Markdown artifacts in the same language as the user's original request, unless the user explicitly asks for another language. Preserve code identifiers, command names, paths, API names, and upstream skill names verbatim.
      - When exploring the existing codebase to clarify the change, prefer the codegraph MCP tool `codegraph_explore` (run `codegraph init` once if the graph is missing) to find symbols, call paths, and blast radius instead of blind grep/glob/Read. Fall back to normal search if codegraph is unavailable.
    needs: [requirements_clarified, proposal_ready]
    next: design

  - id: design
    goal: Explore the technical path, document it, and get user confirmation.
    forbid: [write-source]
    requires_user: true
    capabilities:
      - { id: brainstorming, required: true }
      - { id: writing-plans, required: true }
    rules:
      - Write workflow-authored documents and Markdown artifacts in the same language as the user's original request, unless the user explicitly asks for another language. Preserve code identifiers, command names, paths, API names, and upstream skill names verbatim.
      - Use the brainstorming skill to explore options and tradeoffs before settling on a design direction; do not jump straight to a conclusion.
      - Use writing-plans to document the implementation design, task breakdown, and verification approach before build starts.
      - In the main context, do not Read proposal.md, tasks.md, design.md, or specs before dispatching planning subagents. Only list or test artifact paths, then pass paths.
      - Run writing-plans in subagents (the Task tool) using file handoff only. Pass artifact paths, not file contents; do not inline proposal.md, tasks.md, specs, design.md, or OpenSpec summaries into the prompt.
      - Single-plan handoff inputs are openspec/changes/{change}/proposal.md, openspec/changes/{change}/tasks.md, optional openspec/changes/{change}/design.md, and openspec/changes/{change}/specs/**/*.md. The subagent should read only the files it needs and write docs/superpowers/plans/{change}.md.
      - If specs/**/*.md has more than one file, or tasks.md has more than 6 task groups, shard the plan by dispatching one writing-plans subagent per spec, passing proposal.md, tasks.md, optional design.md, and exactly one specs/{spec-id}/spec.md path. Each child plan writes docs/superpowers/plans/{change}-{spec-id}.md.
      - Dispatch at most 3 writing-plans subagents concurrently (company concurrency limit). If there are more shards than that, run them in batches of 3 and wait for each batch to finish before starting the next, so subagents do not time out.
      - After sharded child plans exist, create a concise manifest at docs/superpowers/plans/{change}.md that links child plans, states execution order, shared contracts, and integration verification. Do not duplicate child implementation steps in the manifest.
      - The main agent should bring back only the manifest or plan path, child plan paths when sharded, a concise summary, and any blockers, then ask the user to confirm.
      - Ground the design in the existing code via the codegraph MCP tool `codegraph_explore` (run `codegraph init` once if the graph is missing) — trace call paths and blast radius for the areas you will touch. Fall back to normal search if codegraph is unavailable.
      - While getting confirmation, also ask the user whether to enable TDD mode (test-driven-development) for the build. Record the answer as the tdd_mode decision — run `decide tdd_mode true` or `decide tdd_mode false` — the build stage reads it.
    needs: [design_documented, tdd_mode, design_confirmed]
    next: build

  - id: build
    goal: Implement the confirmed design.
    capabilities:
      - { id: executing-plans, group: driver }
      - { id: subagent-driven-development, group: driver }
      - { id: test-driven-development, when: the tdd_mode decision from design is true }
    rules:
      - Choose exactly one implementation driver before editing source. Use executing-plans for small, local, mostly sequential changes. Use subagent-driven-development when the implementation can be split across independent modules, needs parallel agents, or benefits from isolated implementer/reviewer/fixer context.
      - Load skills where the code is written, not in the orchestrator. The main session loads ONLY the driver you picked. The per-task skill test-driven-development is loaded by whoever writes the code - the main session under executing-plans, or each implementer subagent under subagent-driven-development. Do NOT load test-driven-development in the main session when driving with subagent-driven-development; the main session only orchestrates.
      - When the tdd_mode decision recorded in design is true (see the `decisions` field of the next output), the implementation MUST be written test-first (a failing test before the code). Whoever writes the code loads test-driven-development: the main session under executing-plans, or the implementer subagent under subagent-driven-development. When tdd_mode is false, implement normally without it.
      - When using subagent-driven-development, run at most 3 implementer subagents concurrently (company concurrency limit); split extra modules into batches of 3 and wait for each batch before starting the next, so subagents do not time out.
      - A subagent only sees what its brief contains - build rules do NOT reach it automatically. When driving with subagent-driven-development and tdd_mode is true, require in each implementer subagent's brief that it load and follow test-driven-development (a failing test before the code).
      - Do not let git worktree isolation block the build. Agent worktrees require the Claude Code session to have been launched inside a git repository; if a worktree-isolated dispatch errors (e.g. "Cannot create agent worktree: not in a git repository"), immediately retry that dispatch WITHOUT worktree isolation, giving each subagent a disjoint set of files/modules so they cannot conflict. If disjoint ownership is not possible, run the implementers sequentially instead of stopping.
      - When using subagent-driven-development bundled helper scripts, invoke the exact script files documented by that skill, such as `scripts/task-brief` and `scripts/review-package`; do not append `.mjs` or run them with `node` unless the actual script file has that extension.
    needs: [implemented]
    next: review

  - id: review
    goal: Review the implementation before verification.
    capabilities:
      - { id: requesting-code-review, required: true }
    needs: [review_result=pass]
    fail_when: review_result=fail
    fail_to: build
    fail_reason: Review found implementation problems.
    next: verify

  - id: verify
    goal: Verify behavior and OpenSpec coverage.
    capabilities:
      - { id: verification-before-completion, required: true }
      - { id: openspec-verify-change, required: true }
    needs: [verify_result=pass]
    fail_when: verify_result=fail
    fail_to: build
    fail_reason: Verification did not pass.
    next: archive

  - id: archive
    goal: Archive the completed change after user confirmation.
    forbid: [write-source]
    requires_user: true
    capabilities:
      - { id: openspec-archive-change, required: true }
    needs: [archived]
    terminal: true
