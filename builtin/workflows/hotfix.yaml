id: hotfix
version: 5
name: Hotfix
start: inspect

states:
  - id: inspect
    goal: Confirm the production issue and patch scope.
    capabilities: [superpowers.inspect, company.knowledge]
    needs: [issue_confirmed]
    next: patch

  - id: patch
    goal: Apply the smallest production-safe patch.
    capabilities: [superpowers.implement]
    needs: [patched]
    next: verify

  - id: verify
    goal: Verify the patch and release readiness.
    capabilities: [company.security, superpowers.verify]
    needs: [verify_result=pass]
    fail_when: verify_result=fail
    fail_to: patch
    fail_reason: Verification did not pass.
    terminal: true
