id: new-project
version: 5
name: New Project
start: open

states:
  - id: open
    goal: Define the project through OpenSpec.
    forbid: [write-source]
    capabilities: [openspec-propose]
    needs: [proposal_ready]
    next: design

  - id: design
    goal: Design the system, check company platform constraints, and get user confirmation.
    forbid: [write-source]
    requires_user: true
    capabilities: [brainstorming, company.platform-design, company.knowledge]
    needs: [design_documented, design_confirmed]
    next: scaffold

  - id: scaffold
    goal: Generate or prepare the project skeleton after confirmation.
    capabilities: [superpowers.implement]
    needs: [scaffolded]
    next: build

  - id: build
    goal: Implement the initial project.
    capabilities: [superpowers.plan, superpowers.implement]
    needs: [implemented]
    next: review

  - id: review
    goal: Review implementation and company standards.
    capabilities: [superpowers.review, company.review, company.security]
    needs: [review_result=pass]
    fail_when: review_result=fail
    fail_to: build
    fail_reason: Review found implementation problems.
    next: verify

  - id: verify
    goal: Verify behavior and OpenSpec coverage.
    capabilities: [superpowers.verify, openspec.verify]
    needs: [verify_result=pass]
    fail_when: verify_result=fail
    fail_to: build
    fail_reason: Verification did not pass.
    terminal: true
