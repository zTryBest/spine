id: new-project
version: 5
name: New Project
intent: Start a project from scratch. Use when there is no existing codebase to build on and the work includes scaffolding the initial skeleton before implementation.
start: open

states:
  - id: open
    goal: Define the project through OpenSpec.
    forbid: [write-source]
    capabilities: [openspec-propose]
    needs: [proposal_ready]
    next: design

  - id: design
    goal: Design the system, check company platform constraints, and get user confirmation.
    forbid: [write-source]
    requires_user: true
    capabilities: [brainstorming]
    rules:
      - Use the brainstorming skill to explore options and tradeoffs before settling on a design direction; do not jump straight to a conclusion.
    needs: [design_documented, design_confirmed]
    next: scaffold

  - id: scaffold
    goal: Generate or prepare the project skeleton after confirmation.
    capabilities: [executing-plans]
    needs: [scaffolded]
    next: build

  - id: build
    goal: Implement the initial project.
    capabilities: [writing-plans, executing-plans]
    needs: [implemented]
    next: review

  - id: review
    goal: Review implementation and company standards.
    capabilities: [requesting-code-review]
    needs: [review_result=pass]
    fail_when: review_result=fail
    fail_to: build
    fail_reason: Review found implementation problems.
    next: verify

  - id: verify
    goal: Verify behavior and OpenSpec coverage.
    capabilities: [verification-before-completion, openspec-verify-change]
    needs: [verify_result=pass]
    fail_when: verify_result=fail
    fail_to: build
    fail_reason: Verification did not pass.
    terminal: true
