<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hikspine</title>
<style>
  :root {
    --bg:#090b0e; --bg2:#101319; --panel:#151922; --panel2:#1d2430; --line:#2a3340; --line2:#3a4656;
    --text:#f1f4f1; --muted:#a2acb8; --dim:#687482;
    --accent:#62d2a2; --accent2:#6aa8f7; --work:#62d2a2; --confirm:#e7bd53; --done:#b690f0; --err:#ff766f;
    --shadow:0 20px 45px -32px rgba(0,0,0,.88);
  }
  [hidden] { display:none !important; }
  * { box-sizing:border-box; }
  html,body { margin:0; min-height:100%; }
  body {
    background:
      linear-gradient(180deg, rgba(32,42,54,.75), transparent 280px),
      linear-gradient(90deg, rgba(98,210,162,.08), transparent 32%, rgba(231,189,83,.06) 68%, transparent),
      repeating-linear-gradient(90deg, rgba(255,255,255,.018) 0 1px, transparent 1px 72px),
      var(--bg);
    color:var(--text);
    font:14px/1.55 "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:1220px; margin:0 auto; padding:30px 26px 70px; }

  header { display:flex; align-items:center; gap:14px; padding:14px 0 18px; border-bottom:1px solid rgba(255,255,255,.07); }
  .logo { width:36px; height:36px; border-radius:8px; background:linear-gradient(135deg,var(--accent),#d7e17d);
    display:grid; place-items:center; font-weight:850; color:#07100b; font-size:18px; box-shadow:0 10px 24px -16px var(--accent); }
  .title { min-width:0; }
  .title h1 { font-size:20px; margin:0; letter-spacing:0; line-height:1.15; }
  .title .t2 { color:var(--muted); font-size:12px; margin-top:3px; display:flex; flex-wrap:wrap; gap:3px 6px; }
  .root { margin-left:0; color:var(--dim); font-size:11.5px; font-family:ui-monospace,monospace; overflow-wrap:anywhere; }
  .hbar { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .live { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:12px;
    background:rgba(21,25,34,.82); border:1px solid var(--line); border-radius:999px; padding:6px 12px; box-shadow:inset 0 1px 0 rgba(255,255,255,.04); }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--work); animation:pulse 2.2s infinite; }
  .dot.demo { background:var(--confirm); }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(63,208,122,.55)} 70%{box-shadow:0 0 0 8px rgba(63,208,122,0)} 100%{box-shadow:0 0 0 0 rgba(63,208,122,0)} }
  .lang { display:flex; background:rgba(21,25,34,.82); border:1px solid var(--line); border-radius:999px; padding:3px; gap:2px; }
  .lang button { font:inherit; font-size:12px; color:var(--muted); background:transparent; border:none; border-radius:999px; padding:4px 11px; cursor:pointer; }
  .lang button.on { color:#07100b; background:linear-gradient(135deg,var(--accent),#d7e17d); font-weight:700; }

  body.no-enter-animation .card { animation:none; }
  .notice-dock { position:fixed; right:22px; bottom:22px; z-index:70; display:flex; flex-direction:column; align-items:flex-end; gap:10px; pointer-events:none; }
  .notice-dock[hidden], .notice-panel[hidden], .notice-toast[hidden] { display:none; }
  .notice-fab, .notice-panel, .notice-toast { pointer-events:auto; }
  .notice-fab { position:relative; width:46px; height:46px; border-radius:14px; border:1px solid var(--line2);
    background:rgba(15,18,24,.94); color:var(--muted); box-shadow:0 18px 38px -28px rgba(0,0,0,.9); cursor:pointer;
    display:grid; place-items:center; font:900 19px/1 ui-sans-serif,system-ui; transition:transform .16s ease,border-color .16s ease,background .16s ease,color .16s ease; }
  .notice-fab:hover { transform:translateY(-1px); border-color:rgba(98,210,162,.45); color:var(--text); }
  .notice-fab.has-pending { color:#1b1405; border-color:rgba(240,198,74,.76); background:linear-gradient(135deg,#f0c64a,#fff0a4); }
  .notice-count { position:absolute; right:-5px; top:-6px; min-width:20px; height:20px; padding:0 6px; border-radius:999px;
    display:grid; place-items:center; background:var(--err); color:white; border:2px solid #11151c; font-size:10.5px; font-weight:900; }
  .notice-toast { width:min(360px, calc(100vw - 32px)); border:1px solid rgba(240,198,74,.36); border-radius:8px;
    background:rgba(17,20,25,.96); box-shadow:0 24px 58px -34px rgba(0,0,0,.95),0 0 0 1px rgba(255,255,255,.03);
    padding:12px 13px; animation:toastIn .18s ease both; cursor:pointer; }
  @keyframes toastIn { from{opacity:0; transform:translateY(8px) scale(.98)} to{opacity:1; transform:none} }
  .notice-panel { width:min(390px, calc(100vw - 32px)); max-height:min(540px, calc(100vh - 104px)); overflow:hidden;
    border:1px solid rgba(255,255,255,.12); border-radius:8px; background:rgba(14,17,23,.98);
    box-shadow:0 26px 70px -34px rgba(0,0,0,.98),0 0 0 1px rgba(255,255,255,.03); display:flex; flex-direction:column; }
  .notice-head { display:flex; align-items:center; gap:10px; padding:13px 14px; border-bottom:1px solid var(--line); }
  .notice-mark { width:28px; height:28px; border-radius:8px; display:grid; place-items:center; flex:0 0 auto;
    color:#1b1405; background:linear-gradient(135deg,#f0c64a,#fff0a4); font-weight:900; }
  .notice-copy { min-width:0; flex:1; }
  .notice-title { font-weight:800; line-height:1.15; }
  .notice-sub { color:var(--muted); font-size:12px; margin-top:2px; }
  .notice-actions { display:flex; align-items:center; gap:7px; }
  .notice-btn { font:inherit; border:1px solid var(--line2); color:var(--text); background:rgba(255,255,255,.035);
    border-radius:6px; padding:6px 9px; cursor:pointer; font-size:12px; font-weight:700; white-space:nowrap; }
  .notice-btn:hover { border-color:rgba(98,210,162,.42); background:rgba(98,210,162,.08); }
  .notice-btn:disabled { cursor:default; opacity:.45; }
  .notice-close { width:30px; height:30px; padding:0; display:grid; place-items:center; color:var(--muted); }
  .notice-list { display:grid; overflow:auto; }
  .notice-item { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:10px; padding:11px 14px; border-top:1px solid rgba(255,255,255,.055); }
  .notice-item:first-child { border-top:none; }
  .notice-item.handled { opacity:.56; }
  .notice-line { min-width:0; }
  .notice-type { color:#ffe08a; font-size:12px; font-weight:800; }
  .notice-msg { color:var(--text); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .notice-meta { color:var(--dim); font-size:11.5px; margin-top:3px; }
  .notice-done { align-self:center; }
  .notice-empty { color:var(--dim); padding:14px; font-style:italic; }

  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:22px 0 8px; }
  .stat { background:linear-gradient(180deg,rgba(21,25,34,.95),rgba(14,17,23,.96)); border:1px solid var(--line);
    border-radius:8px; padding:15px 16px; position:relative; overflow:hidden; box-shadow:var(--shadow); transition:transform .18s ease,border-color .18s ease; }
  .stat:hover { transform:translateY(-1px); border-color:var(--line2); }
  .stat::after { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--dim); }
  .stat.work::after{background:var(--work)} .stat.confirm::after{background:var(--confirm)} .stat.done::after{background:var(--done)} .stat.total::after{background:var(--accent)}
  .stat .n { font-size:26px; font-weight:750; line-height:1; }
  .stat.work .n{color:var(--work)} .stat.confirm .n{color:var(--confirm)} .stat.done .n{color:#b9a6ff}
  .stat .l { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.7px; margin-top:7px; }
  .metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin:8px 0 4px; }
  .stat.attn::after{background:var(--confirm)} .stat.attn .n{color:var(--confirm)}
  .timing { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:10px 0 6px; }
  .timing-col { background:linear-gradient(180deg,rgba(21,25,34,.9),rgba(14,17,23,.94)); border:1px solid var(--line); border-radius:8px; padding:12px 14px; }
  .timing-col h3 { font-size:11px; color:var(--muted); margin:0 0 10px; text-transform:uppercase; letter-spacing:.6px; font-weight:700; }
  .timing-table { width:100%; border-collapse:collapse; font-size:12px; }
  .timing-table th { text-align:right; color:var(--dim); font-weight:600; padding:3px 6px; font-size:10.5px; text-transform:uppercase; }
  .timing-table th:first-child, .timing-table td:first-child { text-align:left; }
  .timing-table td { padding:5px 6px; border-top:1px solid var(--line); text-align:right; }
  .timing-table tr.slow td { color:var(--confirm); font-weight:750; }
  .stage-bars { display:flex; flex-direction:column; gap:7px; }
  .stage-bar { display:grid; grid-template-columns:92px 1fr 54px; align-items:center; gap:8px; font-size:12px; }
  .sb-label { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#cbd5e8; }
  .sb-track { height:8px; background:var(--panel2); border-radius:999px; overflow:hidden; }
  .sb-fill { display:block; height:100%; background:var(--work); border-radius:999px; }
  .sb-val { text-align:right; color:var(--muted); font-variant-numeric:tabular-nums; }
  .stage-bar.slow .sb-fill { background:var(--confirm); }
  .stage-bar.slow .sb-label, .stage-bar.slow .sb-val { color:var(--confirm); font-weight:750; }
  .projects { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; margin-bottom:8px; }
  .projects-hint { grid-column:1/-1; font-size:12px; color:var(--muted); margin:0 0 2px; }
  .project-card { background:linear-gradient(180deg,rgba(21,25,34,.95),rgba(13,16,21,.96)); border:1px solid var(--line); border-radius:8px; padding:12px 14px; box-shadow:var(--shadow); cursor:pointer; transition:border-color .12s, transform .12s; }
  .project-card:hover { border-color:var(--accent); transform:translateY(-1px); }
  .project-card.error { border-color:rgba(255,118,111,.42); cursor:default; }
  .project-card.attn { border-color:var(--confirm); box-shadow:0 0 0 1px rgba(240,180,90,.18),var(--shadow); }
  .project-card .drill { margin-top:8px; font-size:11px; color:var(--accent); opacity:.85; }
  .project-name { font-weight:800; display:flex; align-items:center; gap:8px; min-width:0; }
  .project-name span:first-child { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .project-version { color:var(--dim); font-size:10.5px; font-family:ui-monospace,monospace; border:1px solid var(--line2); border-radius:5px; padding:1px 5px; }
  .project-root { color:var(--dim); font-size:11px; font-family:ui-monospace,monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:5px; }
  .project-metrics { display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; }
  .project-metrics span { color:#cbd5e8; background:var(--panel2); border:1px solid var(--line2); border-radius:999px; padding:2px 7px; font-size:11px; }
  .project-metrics .hot { color:#ffe08a; border-color:rgba(240,198,74,.36); background:rgba(240,198,74,.08); }
  .project-metrics .done { color:#b9a6ff; border-color:rgba(182,144,240,.36); background:rgba(182,144,240,.08); }
  .project-error { color:var(--err); font-size:11.5px; margin-top:8px; }
  .scope-bar { display:flex; align-items:center; gap:12px; margin:18px 0 8px; padding:10px 12px; border:1px solid var(--line); border-radius:8px; background:rgba(18,23,31,.8); box-shadow:var(--shadow); }
  .scope-kicker { color:var(--dim); font-size:10.5px; text-transform:uppercase; letter-spacing:.8px; }
  .scope-title { color:var(--text); font-size:14px; font-weight:800; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .scope-sub { color:var(--muted); font-size:11px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .scope-spacer { flex:1 1 auto; }

  h2 { font-size:11px; text-transform:uppercase; letter-spacing:1.2px; color:#b8c2cf; margin:30px 0 12px; font-weight:750; display:flex; align-items:center; gap:9px; }
  h2::before { content:""; width:8px; height:8px; border-radius:2px; background:var(--accent); box-shadow:0 0 0 3px rgba(98,210,162,.12); }

  .cards { display:grid; gap:15px; grid-template-columns:repeat(auto-fill, minmax(440px,1fr)); }
  .card { background:linear-gradient(180deg,rgba(21,25,34,.98),rgba(13,16,21,.98)); border:1px solid var(--line);
    border-radius:8px; padding:17px 18px 15px; box-shadow:var(--shadow); animation:rise .4s ease both; position:relative; overflow:hidden; transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease; }
  .card::before { content:""; position:absolute; inset:0 auto 0 0; width:3px; background:var(--line2); }
  @keyframes rise { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }
  .card.active { border-color:rgba(98,210,162,.58); box-shadow:0 0 0 1px rgba(98,210,162,.28), var(--shadow); }
  .card.active::before { background:linear-gradient(180deg,var(--accent),var(--accent2)); }
  .card .top { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .card .name { font-weight:700; font-size:16px; }
  .card .wf { color:#d6dde7; font-size:11.5px; font-family:ui-monospace,monospace;
    background:rgba(29,36,48,.9); border:1px solid var(--line2); border-radius:6px; padding:2px 8px; }
  .card .project-tag { color:#d9f4e7; font-size:11.5px; border:1px solid rgba(98,210,162,.32); border-radius:6px; padding:2px 8px; background:rgba(98,210,162,.08); max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .star { color:var(--accent); }
  .badge { margin-left:auto; font-size:10.5px; padding:4px 11px; border-radius:999px; font-weight:800; letter-spacing:.4px; }
  .badge.work{background:rgba(63,208,122,.15);color:var(--work)} .badge.confirm{background:rgba(240,198,74,.15);color:var(--confirm)}
  .badge.done{background:rgba(154,123,255,.18);color:#b9a6ff} .badge.archived{background:rgba(98,210,162,.18);color:var(--accent)}
  .badge.error{background:rgba(255,107,99,.15);color:var(--err)}

  .pipe { display:flex; align-items:flex-start; margin:6px 2px 14px; }
  .step { display:flex; align-items:center; flex:1; min-width:0; }
  .step:last-child { flex:0 0 auto; }
  .node { display:flex; flex-direction:column; align-items:center; gap:7px; width:46px; }
  .bub { width:30px; height:30px; border-radius:8px; display:grid; place-items:center; font-size:12.5px; font-weight:800;
    background:var(--panel2); border:2px solid var(--line2); color:var(--dim); transition:.3s; }
  .node.done .bub { background:linear-gradient(135deg,var(--work),#d7e17d); border-color:transparent; color:#07100b; }
  .node.curr .bub { border-color:var(--accent); color:var(--accent); background:rgba(110,168,254,.08); animation:ring 2s infinite; }
  .node.curr.cf .bub { border-color:var(--confirm); color:var(--confirm); animation:ringc 2s infinite; }
  @keyframes ring { 0%{box-shadow:0 0 0 0 rgba(110,168,254,.5)} 70%{box-shadow:0 0 0 7px rgba(110,168,254,0)} 100%{box-shadow:0 0 0 0 rgba(110,168,254,0)} }
  @keyframes ringc { 0%{box-shadow:0 0 0 0 rgba(240,198,74,.5)} 70%{box-shadow:0 0 0 7px rgba(240,198,74,0)} 100%{box-shadow:0 0 0 0 rgba(240,198,74,0)} }
  .node .lbl { font-size:11px; color:var(--muted); white-space:nowrap; }
  .node.curr .lbl { color:var(--text); font-weight:600; }
  .node.done .lbl { color:#7fd6a3; }
  .bar { flex:1; height:3px; border-radius:2px; background:var(--line2); margin:0 3px; margin-top:13px; }
  .bar.done { background:linear-gradient(90deg,var(--work),#2fae63); }

  .foot { display:flex; gap:14px 18px; flex-wrap:wrap; color:var(--muted); font-size:12px; border-top:1px solid var(--line); padding-top:11px; margin-top:2px; }
  .foot b { color:var(--text); font-weight:500; }
  .card.clickable { cursor:pointer; }
  .card.clickable:hover { transform:translateY(-2px); border-color:rgba(98,210,162,.42); box-shadow:0 22px 48px -32px rgba(0,0,0,.96),0 0 0 1px rgba(98,210,162,.12); }

  .tl { margin-top:13px; border-top:1px solid var(--line); padding:11px 10px 3px; background:rgba(255,255,255,.018); border-radius:6px; }
  .tl-head { color:var(--dim); font-size:10.5px; text-transform:uppercase; letter-spacing:.8px; margin-bottom:9px; display:flex; gap:8px; }
  .tl-head b { color:var(--muted); font-weight:600; }
  .tl-item { display:flex; align-items:center; gap:9px; padding:3px 0; font-size:12px; }
  .tl-rail { width:9px; flex:0 0 auto; display:flex; justify-content:center; }
  .tl-dot { width:8px; height:8px; border-radius:50%; background:var(--dim); box-shadow:0 0 0 3px rgba(255,255,255,.02); }
  .tl-dot.start{background:var(--accent)} .tl-dot.move{background:#7aa7ff} .tl-dot.ok{background:var(--work)}
  .tl-dot.fail{background:var(--err)} .tl-dot.done{background:var(--done)}
  .tl-text { color:var(--text); }
  .tl-text .k { color:var(--muted); font-family:ui-monospace,monospace; font-size:11px; }
  .tl-time { margin-left:auto; color:var(--dim); font-size:11px; white-space:nowrap; }

  .legend { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:12px; }
  .wf-chip { background:linear-gradient(180deg,rgba(21,25,34,.95),rgba(13,16,21,.96)); border:1px solid var(--line); border-radius:8px; padding:12px 14px; box-shadow:var(--shadow); transition:transform .18s ease,border-color .18s ease; }
  button.wf-chip { color:var(--text); font:inherit; text-align:left; width:100%; cursor:pointer; }
  button.wf-chip:hover { transform:translateY(-1px); border-color:rgba(98,210,162,.42); }
  .wf-chip.active { border-color:rgba(98,210,162,.6); box-shadow:0 0 0 1px rgba(98,210,162,.25), var(--shadow); }
  .wf-chip .id { font-weight:700; font-size:13.5px; display:flex; align-items:center; gap:7px; }
  .wf-chip .tag { font-size:10px; color:var(--dim); font-family:ui-monospace,monospace; border:1px solid var(--line2); border-radius:5px; padding:0 5px; }
  .wf-chip .it { color:var(--muted); font-size:12px; margin-top:5px; }
  .node .mins { color:var(--dim); font-size:10px; line-height:1; white-space:nowrap; }
  .artifacts { margin-top:12px; border-top:1px solid var(--line); padding-top:11px; }
  .artifact-head { color:var(--dim); font-size:10.5px; text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; }
  .artifact-stage { display:flex; align-items:flex-start; gap:9px; padding:4px 0; min-width:0; }
  .artifact-stage .stage-name { color:var(--muted); font-size:11px; width:72px; flex:0 0 auto; padding-top:4px; }
  .artifact-files { display:flex; flex-wrap:wrap; gap:7px; min-width:0; }
  .artifact-btn { color:#ecf8f1; background:rgba(34,44,55,.9); border:1px solid var(--line2); border-radius:6px; padding:4px 8px; font:inherit; font-size:11px; cursor:pointer; max-width:220px; overflow:hidden; display:flex; align-items:center; gap:6px; white-space:nowrap; }
  .artifact-btn:hover { border-color:rgba(98,210,162,.7); background:rgba(36,55,49,.95); }
  .artifact-btn-type { color:#07100b; background:linear-gradient(135deg,var(--accent),#d7e17d); border-radius:4px; padding:1px 5px; font-size:9.5px; font-weight:800; flex:0 0 auto; }
  .artifact-btn-title { overflow:hidden; text-overflow:ellipsis; min-width:0; }
  .artifact-empty { color:var(--dim); font-size:11px; font-style:italic; }
  .workflow-detail { background:linear-gradient(180deg,rgba(21,25,34,.96),rgba(13,16,21,.97)); border:1px solid var(--line); border-radius:8px; padding:14px 16px; box-shadow:var(--shadow); }
  .workflow-detail-head { display:flex; align-items:center; gap:10px; margin-bottom:12px; min-width:0; }
  .workflow-detail-head b { font-size:15px; }
  .workflow-detail-head .tag { font-size:10px; color:#d9f4e7; font-family:ui-monospace,monospace; border:1px solid rgba(98,210,162,.32); border-radius:5px; padding:1px 6px; background:rgba(98,210,162,.08); white-space:nowrap; }
  .workflow-detail-head .it { color:var(--muted); font-size:12px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .workflow-actionbar { display:flex; justify-content:flex-end; align-items:center; gap:8px; margin:-4px 0 10px; }
  .canvas-open.ghost { color:#cbd5e8; background:var(--panel2); border-color:var(--line2); }
  .canvas-open.ghost:hover { border-color:var(--accent); color:#fff; filter:none; }
  .workflow-stage { display:grid; grid-template-columns:120px 1fr; gap:12px; border-top:1px solid var(--line); padding:12px 0; }
  .workflow-stage:first-of-type { border-top:none; }
  .stage-id { display:flex; align-items:center; gap:8px; min-width:0; }
  .stage-num { width:24px; height:24px; border-radius:7px; display:grid; place-items:center; background:var(--panel2); border:1px solid var(--line2); color:var(--accent); font-size:11px; font-weight:800; }

<div class="wrap">

    <div class="modal-head">

async function loadUiLabels(projectId = selectedProjectId, force = false) {
  const key = uiLabelsCacheKey(projectId);
  if (!force && uiLabelsCache.has(key)) {

  project:{zh:'项目级',en:'Project'}, user:{zh:'用户级',en:'User'}, local:{zh:'本地插件',en:'Plugin'},
  marketplace:{zh:'插件市场',en:'Marketplace'}, unknown:{zh:'未知来源',en:'Unknown'},
};
const SCOPE_HELP = {
  project:{zh:'当前项目 .claude/skills，优先级最高，适合项目专属流程。', en:'Current project .claude/skills — highest priority, for project-specific flows.'},
  user:{zh:'用户级 ~/.claude/skills，适合个人常用技能。', en:'User-level ~/.claude/skills — your personal skills.'},
  local:{zh:'本 Hikspine 插件随包分发的 skills，安装插件后可用。', en:'Shipped with the Hikspine plugin — available once installed.'},
  marketplace:{zh:'Claude Code 插件市场中的 skills，由已安装插件提供。', en:'From Claude Code plugin marketplaces, provided by installed plugins.'},
  unknown:{zh:'来源未识别，仍会作为可发现技能展示。', en:'Source not identified; still shown as discoverable.'},
};
function scopeOf(skill) {
  const raw = skill.scope || skill.source || 'unknown';
  if (raw === 'personal') return 'user';
  if (raw === 'plugin') return 'local';
  return SCOPE_ORDER.includes(raw) ? raw : 'unknown';
}
function skillUsage(skill) {

    if (skill.name === 'hikspine-ui') return '在 Claude Code 中说“启动 Hikspine 看板”，由该技能启动本地看板。';
    if (skill.name === 'hikspine') return '在 Claude Code 中说“/hs ...”或“使用 hikspine ...”，驱动 next / decide 工作流。';
    return '在 Claude Code 中描述符合该技能说明的任务即可触发；也可在 workflow 的 capabilities 中引用 `' + skill.name + '`。';
  }

  if (skill.name === 'hikspine') return 'Say "/hs ..." or "use hikspine ..." in Claude Code to drive the next / decide loop.';
  return 'Trigger it by describing a matching task in Claude Code; or reference `' + skill.name + '` in workflow capabilities.';
}

const ARTIFACT_TYPE = {
  proposal:{zh:'提案',en:'Proposal'}, design:{zh:'设计',en:'Design'}, tasks:{zh:'任务',en:'Tasks'},
  spec:{zh:'规格',en:'Spec'}, review:{zh:'评审',en:'Review'}, verification:{zh:'验证',en:'Verify'},
  brainstorm:{zh:'头脑风暴',en:'Brainstorm'}, plan:{zh:'计划',en:'Plan'}, markdown:{zh:'Markdown',en:'Markdown'},
};
function artifactTypeLabel(type) {
  const key = ARTIFACT_TYPE[type] ? type : 'markdown';
  return ARTIFACT_TYPE[key][lang];
}
function artifactTypeFromPath(path) {
  const p = String(path || '').replace(/\\/g,'/').toLowerCase();
  const name = p.split('/').pop() || '';
  if (name === 'proposal.md') return 'proposal';
  if (name === 'design.md') return 'design';
  if (name === 'tasks.md') return 'tasks';
  if (p.startsWith('specs/') || p.includes('/specs/')) return 'spec';
  if (name.includes('review')) return 'review';
  if (name.includes('verify') || name.includes('verification')) return 'verification';
  if (name.includes('brainstorm')) return 'brainstorm';
  if (p.includes('/plans/') || name.includes('plan')) return 'plan';
  return 'markdown';
}
function artifactMeta(path, projectId) {
  return (last?.changes || []).flatMap(c => c.artifacts || []).find(a => a.path === path && (!projectId || a.projectId === projectId));
}
function inlineMd(text) {
  return esc(text)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, labelText, url) => {
      const clean = url.replace(/&amp;/g, '&');
      if (!/^(https?:|mailto:|#|\.{0,2}\/)/.test(clean)) return labelText;
      return '<a href="'+esc(clean)+'" target="_blank" rel="noopener noreferrer">'+labelText+'</a>';
    });
}
function tableHtml(lines, start) {
  if (start + 1 >= lines.length || !/^\s*\|?[\s:-]+\|[\s|:-]*$/.test(lines[start + 1])) return null;
  const split = (line) => line.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(s => s.trim());
  const head = split(lines[start]);
  const rows = [];
  let i = start + 2;
  while (i < lines.length && /\|/.test(lines[i]) && lines[i].trim()) {
    rows.push(split(lines[i]));
    i++;
  }
  const th = head.map(c => '<th>'+inlineMd(c)+'</th>').join('');
  const tr = rows.map(row => '<tr>'+head.map((_, idx) => '<td>'+inlineMd(row[idx] || '')+'</td>').join('')+'</tr>').join('');
  return { html:'<table><thead><tr>'+th+'</tr></thead><tbody>'+tr+'</tbody></table>', next:i };
}
function blockStart(line, nextLine) {
  return !line.trim() || /^```/.test(line) || /^(#{1,6})\s+/.test(line) || /^>\s?/.test(line) ||
    /^[-*]\s+/.test(line) || /^\d+\.\s+/.test(line) || /^\s*---+\s*$/.test(line) ||
    (/\|/.test(line) && nextLine && /^\s*\|?[\s:-]+\|[\s|:-]*$/.test(nextLine));
}
function markdownToHtml(markdown) {
  const lines = String(markdown || '').replace(/\r\n?/g, '\n').split('\n');
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (!line.trim()) { i++; continue; }
    if (/^```/.test(line)) {
      const code = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) code.push(lines[i++]);
      if (i < lines.length) i++;
      out.push('<pre><code>'+esc(code.join('\n'))+'</code></pre>');
      continue;
    }
    const heading = line.match(/^(#{1,6})\s+(.+)$/);
    if (heading) {
      const level = Math.min(4, heading[1].length);
      out.push('<h'+level+'>'+inlineMd(heading[2])+'</h'+level+'>');
      i++;
      continue;
    }
    const table = tableHtml(lines, i);
    if (table) { out.push(table.html); i = table.next; continue; }
    if (/^\s*---+\s*$/.test(line)) { out.push('<hr>'); i++; continue; }
    if (/^>\s?/.test(line)) {
      const quote = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) quote.push(lines[i++].replace(/^>\s?/, ''));
      out.push('<blockquote>'+quote.map(inlineMd).join('<br>')+'</blockquote>');
      continue;
    }
    if (/^[-*]\s+/.test(line) || /^\d+\.\s+/.test(line)) {
      const ordered = /^\d+\.\s+/.test(line);
      const items = [];
      const re = ordered ? /^\d+\.\s+/ : /^[-*]\s+/;
      while (i < lines.length && re.test(lines[i])) items.push('<li>'+inlineMd(lines[i++].replace(re, ''))+'</li>');
      out.push((ordered ? '<ol>' : '<ul>')+items.join('')+(ordered ? '</ol>' : '</ul>'));
      continue;
    }
    const para = [];
    while (i < lines.length && !blockStart(lines[i], lines[i+1])) para.push(lines[i++].trim());
    out.push('<p>'+inlineMd(para.join(' '))+'</p>');
  }
  return out.join('');
}

function relTime(at) {
  if (!at) return '';
  const d = Date.now() - new Date(at).getTime();
  if (d < 60000) return t('tNow');
  const m = Math.floor(d/60000); if (m < 60) return m + t('tMin');
  const h = Math.floor(d/3600000); if (h < 24) return h + t('tHour');
  return Math.floor(d/86400000) + t('tDay');
}
function evtLine(e) {
  if (e.type === 'started') return { dot:'start', html:t('evStarted') };
  if (e.type === 'transition') return { dot:'move', html:t('evEnter')+' <b>'+esc(label(e.to))+'</b>' };
  if (e.type === 'rollback') return { dot:'fail', html:t('evRollback')+' <b>'+esc(label(e.to))+'</b>' };
  if (e.type === 'complete') return { dot:'done', html:t('evDone') };
  if (e.type === 'decide') {
    const val = (e.value === true || e.value === 'true') ? '' : '='+esc(String(e.value));
    return { dot: e.value === 'fail' ? 'fail' : 'ok', html:t('evDecide')+' <span class="k">'+esc(e.key)+val+'</span>' };
  }
  return { dot:'', html:esc(e.type) };
}
function timeline(c) {
  const h = Array.isArray(c.history) ? c.history : [];
  if (!h.length) return '';
  const decided = c.decisions ? Object.keys(c.decisions).length : h.filter(e=>e.type==='decide').length;
  const startAt = c.startedAt || h[0].at;
  const items = h.slice(-5).reverse().map(e => {
    const x = evtLine(e);
    return '<div class="tl-item"><span class="tl-rail"><span class="tl-dot '+x.dot+'"></span></span>'+
      '<span class="tl-text">'+x.html+'</span><span class="tl-time">'+esc(relTime(e.at))+'</span></div>';
  }).join('');
  const head = '<div class="tl-head"><span>'+t('timeline')+'</span>'+
    (startAt?'<span>· '+t('started')+' <b>'+esc(relTime(startAt))+'</b></span>':'')+
    '<span>· '+t('recorded')+' <b>'+decided+'</b></span></div>';
  return '<div class="tl">'+head+items+'</div>';
}
function artifactList(c) {
  const artifacts = Array.isArray(c.artifacts) ? c.artifacts : [];
  if (!artifacts.length) return '<div class="artifacts"><div class="artifact-head">'+(lang==='zh'?'阶段产物':'Stage artifacts')+'</div><div class="artifact-empty">'+(lang==='zh'?'未发现 Markdown 产物':'No Markdown artifacts found')+'</div></div>';
  const baseStages = Array.isArray(c.stages) ? c.stages : [];
  const extraStages = artifacts.map(a => a.stage || 'openspec').filter(stage => !baseStages.includes(stage));
  const stages = [...baseStages, ...extraStages];
  const rows = stages.map(stage => {
    const files = artifacts.filter(a => (a.stage || 'openspec') === stage);
    if (!files.length) return '';
    const buttons = files.slice(0, 8).map(a =>
      '<button type="button" class="artifact-btn" data-artifact="'+esc(a.path)+'" data-project-id="'+esc(a.projectId || c.projectId || '')+'" data-type="'+esc(a.type || artifactTypeFromPath(a.path))+'" title="'+esc(a.path)+'">'+
      '<span class="artifact-btn-type">'+esc(artifactTypeLabel(a.type || artifactTypeFromPath(a.path)))+'</span>'+
      '<span class="artifact-btn-title">'+esc(a.title || a.path)+'</span></button>'
    ).join('');
    return '<div class="artifact-stage"><div class="stage-name">'+esc(label(stage))+'</div><div class="artifact-files">'+buttons+'</div></div>';
  }).join('');
  return rows ? '<div class="artifacts"><div class="artifact-head">'+(lang==='zh'?'阶段产物':'Stage artifacts')+'</div>'+rows+'</div>' : '';
}
function pipe(c) {
  if (c.error || !Array.isArray(c.stages)) return '';
  let h = '<div class="pipe">';
  c.stages.forEach((id,i) => {
    const isDone = c.complete ? true : i < c.stageIndex;
    const isCurr = !c.complete && i === c.stageIndex;
    const cls = isDone ? 'done' : (isCurr ? 'curr '+(c.nextAction==='confirm'?'cf':'') : '');
    const mins = c.stageDurations && Number(c.stageDurations[id]) ? Number(c.stageDurations[id]) : 0;
    const minsHtml = mins ? '<div class="mins">'+mins+' '+(lang==='zh'?'分钟':'min')+'</div>' : '';
    h += '<div class="step"><div class="node '+cls+'"><div class="bub">'+(isDone?'✓':(i+1))+'</div><div class="lbl">'+esc(label(id))+'</div>'+minsHtml+'</div>';
    if (i < c.stages.length-1) h += '<div class="bar '+(isDone?'done':'')+'"></div>';
    h += '</div>';
  });
  return h+'</div>';
}
function badge(c) {
  if (c.error) return '<span class="badge error">'+t('bError')+'</span>';
  if (c.archived) return '<span class="badge archived">'+t('bArchived')+'</span>';
  if (c.complete) return '<span class="badge done">'+t('bDone')+'</span>';
  return '<span class="badge '+c.nextAction+'">'+(c.nextAction==='confirm'?t('bConfirm'):t('bWork'))+'</span>';
}
function renderStats(changes) {
  const n = { work:0, confirm:0, done:0 };
  changes.forEach(c => { if (c.error) return; if (c.complete) n.done++; else n[c.nextAction]++; });
  $('stats').innerHTML =
    '<div class="stat total"><div class="n">'+changes.length+'</div><div class="l">'+t('stTotal')+'</div></div>'+
    '<div class="stat work"><div class="n">'+n.work+'</div><div class="l">'+t('stWork')+'</div></div>'+
    '<div class="stat confirm"><div class="n">'+n.confirm+'</div><div class="l">'+t('stConfirm')+'</div></div>'+
    '<div class="stat done"><div class="n">'+n.done+'</div><div class="l">'+t('stDone')+'</div></div>';
}
function fmtMins(m) {
  m = Math.round(Number(m) || 0);
  if (m <= 0) return '—';
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60), mm = m % 60;
  if (h < 24) return mm ? h + 'h ' + mm + 'm' : h + 'h';
  const d = Math.floor(h / 24), hh = h % 24;
  return hh ? d + 'd ' + hh + 'h' : d + 'd';
}

// Timing insight for the overview: which workflow is slow, and which stage is
// slow. Built purely from each change's stageDurations (minutes per stage,
// already computed server-side) — no engine dependency, recomputed on refresh.
function renderTiming(state, opts = {}) {
  const host = $('timingPanel');
  const showTaskCount = opts.showTaskCount !== false;
  const changes = (Array.isArray(state.changes) ? state.changes : []).filter(c => !c.error);
  const wf = {};   // workflow id -> { count, total }
  const stg = {};  // stage id -> { total, visits }
  for (const c of changes) {
    const sd = c.stageDurations || {};
    let total = 0;
    for (const [s, mins] of Object.entries(sd)) {
      const v = Number(mins) || 0;
      if (v <= 0) continue;
      total += v;
      const g = stg[s] || (stg[s] = { total: 0, visits: 0 });
      g.total += v; g.visits += 1;
    }
    const w = wf[c.workflow] || (wf[c.workflow] = { count: 0, total: 0 });
    w.count += 1; w.total += total;
  }
  const wfRows = Object.entries(wf).map(([id, v]) => ({ id, count: v.count, total: v.total, avg: v.count ? v.total / v.count : 0 }))
    .sort((a, b) => b.avg - a.avg);
  const stgRows = Object.entries(stg).map(([id, v]) => ({ id, total: v.total, avg: v.visits ? v.total / v.visits : 0 }))
    .sort((a, b) => b.avg - a.avg);
  if (!wfRows.some(r => r.total > 0) && !stgRows.length) {
    host.innerHTML = '<div class="need" style="grid-column:1/-1">' + esc(t('tNoTiming')) + '</div>';
    return;
  }
  const wfHtml = '<div class="timing-col"><h3>' + esc(t('tWorkflowTime')) + '</h3>' +
    '<table class="timing-table"><thead><tr><th></th>' + (showTaskCount ? '<th>' + t('tTasks') + '</th>' : '') + '<th>' + t('tAvg') + '</th><th>' + t('tTotal') + '</th></tr></thead><tbody>' +
    wfRows.map((r, i) => '<tr' + (i === 0 && r.total > 0 ? ' class="slow"' : '') + '><td>' + esc(wfTag(r.id) || r.id) + '</td>' + (showTaskCount ? '<td>' + r.count + '</td>' : '') + '<td>' + fmtMins(r.avg) + '</td><td>' + fmtMins(r.total) + '</td></tr>').join('') +
    '</tbody></table></div>';
  const maxAvg = Math.max(...stgRows.map(r => r.avg), 1);
  const stgHtml = '<div class="timing-col"><h3>' + esc(t('tStageTime')) + '</h3><div class="stage-bars">' +
    stgRows.map((r, i) => '<div class="stage-bar' + (i === 0 ? ' slow' : '') + '"><span class="sb-label" title="' + esc(label(r.id)) + '">' + esc(label(r.id)) + '</span>' +
      '<span class="sb-track"><span class="sb-fill" style="width:' + Math.round(r.avg / maxAvg * 100) + '%"></span></span>' +
      '<span class="sb-val">' + fmtMins(r.avg) + '</span></div>').join('') +
    '</div></div>';
  host.innerHTML = wfHtml + stgHtml;
}

// Global-overview KPIs, computed purely from the /api/state all-projects
// payload (projects + changes + notifications). No engine/server dependency —
// refreshing the page recomputes these live.
function renderMetrics(state) {
  const projects = Array.isArray(state.projects) ? state.projects : [];
  const notifs = (Array.isArray(state.notifications) ? state.notifications : []).filter(n => !n.handled);
  const sum = (key) => projects.reduce((n, p) => n + Number(p.counts?.[key] || 0), 0);
  const work = sum('work');
  const confirm = sum('confirm');
  const done = sum('done');
  const activeProjects = projects.filter(p => p.counts && ((p.counts.work||0) > 0 || (p.counts.confirm||0) > 0)).length;
  const card = (cls, n, l) => '<div class="stat '+cls+'"><div class="n">'+n+'</div><div class="l">'+esc(l)+'</div></div>';
  $('metricsPanel').innerHTML =
    card('total', projects.length, t('mProjects')) +
    card('work', activeProjects, t('mActive')) +
    card('work', work, t('mWork')) +
    card('attn', confirm, t('mConfirm')) +
    card('attn', notifs.length, t('mNotif')) +
    card('done', done, t('mDone'));
}
function renderProjectMetrics(state) {
  const changes = Array.isArray(state.changes) ? state.changes : [];
  const notifs = (Array.isArray(state.notifications) ? state.notifications : []).filter(n => !n.handled);
  const total = changes.filter(c => !c.error).length;
  const work = changes.filter(c => !c.error && !c.complete && !c.archived).length;
  const done = changes.filter(c => !c.error && (c.complete || c.archived)).length;
  const card = (cls, n, l) => '<div class="stat '+cls+'"><div class="n">'+n+'</div><div class="l">'+esc(l)+'</div></div>';
  $('metricsPanel').innerHTML =
    card('total', total, t('stTotal')) +
    card('work', work, t('mWork')) +
    card('attn', notifs.length, t('mNotif')) +
    card('done', done, t('stDone'));
}
async function openArtifact(path, projectId) {
  let data;
  const demo = last && last.demo;
  const meta = artifactMeta(path, projectId);
  if (demo) {
    data = meta ? { path, type: meta.type, content: meta.content || '# '+(meta.title || path)+'\n\nDemo artifact preview.' } : null;
  } else {
    const suffix = projectId ? '&projectId='+encodeURIComponent(projectId) : '';
    data = await api('/api/artifact?path='+encodeURIComponent(path)+suffix);
  }
  const type = (data && data.type) || (meta && meta.type) || artifactTypeFromPath(path);
  $('artifactType').textContent = artifactTypeLabel(type);
  if (!data || data.error) {
    $('artifactTitle').textContent = lang==='zh' ? '无法预览' : 'Preview unavailable';
    $('artifactPath').textContent = path || '';
    $('artifactBody').innerHTML = '<div class="md-error">'+esc(data && data.error ? data.error : '')+'</div>';
  } else {
    $('artifactTitle').textContent = meta?.title || (lang==='zh' ? 'Markdown 预览' : 'Markdown preview');
    $('artifactPath').textContent = data.path || path;
    $('artifactBody').innerHTML = markdownToHtml(data.content || '');
  }
  $('artifactClose').textContent = lang==='zh' ? '关闭' : 'Close';
  $('artifactModal').hidden = false;
}
function closeArtifact() {
  $('artifactModal').hidden = true;
}
function projectAttentionRank(p) {
  const c = p?.counts || {};
  return (c.confirm || 0) > 0 ? 0 : (c.work || 0) > 0 ? 1 : 2;
}
function projectTimeRank(p) {
  return Date.parse(p?.updatedAt || p?.lastSeenAt || '') || 0;
}
function compareProjects(a, b) {
  const ar = projectAttentionRank(a);
  const br = projectAttentionRank(b);
  return ar - br
    || (b.counts?.confirm || 0) - (a.counts?.confirm || 0)
    || (b.counts?.work || 0) - (a.counts?.work || 0)
    || projectTimeRank(b) - projectTimeRank(a);
}
function currentProjectMeta() {
  return projectOptions.find(p => p.id === selectedProjectId) || null;
}
let projectOptionsLoading = false;

  if (projectOptions.length || projectOptionsLoading) return;

  title.textContent = allMode ? (lang === 'zh' ? '项目' : 'Projects') : (lang === 'zh' ? '切换项目' : 'Switch project');

    return;

function renderChanges(changes, emptyMsg) {

  $('changes').innerHTML = changes.map(c => {

    const missing = (c.missing && c.missing.length) ? c.missing.join(', ') : '—';
    const goal = goalText(c);
    return '<div class="card clickable'+(c.active?' active':'')+'" data-change="'+esc(c.change)+'" data-project-id="'+esc(c.projectId || '')+'">'+
      '<div class="top">'+(c.active?'<span class="star">★</span>':'')+'<span class="name">'+esc(c.change)+'</span>'+
      (c.projectName?'<span class="project-tag">'+esc(c.projectName)+'</span>':'')+'<span class="wf">'+esc(c.workflow)+'</span>'+badge(c)+'</div>'+
      pipe(c)+
      '<div class="foot"><span>'+t('cur')+' <b>'+esc(label(c.current))+'</b></span>'+
      (goal?'<span>'+esc(goal)+'</span>':'')+
      '<span>'+t('pending')+' <b>'+esc(missing)+'</b></span></div>'+artifactList(c)+timeline(c)+'</div>';
  }).join('');
  $('changes').querySelectorAll('.artifact-btn').forEach(btn => {
    btn.onclick = (event) => { event.stopPropagation(); openArtifact(btn.dataset.artifact, btn.dataset.projectId || selectedProjectId || ''); };
  });
  $('changes').querySelectorAll('.card.clickable').forEach(card => {
    card.onclick = async () => {
      const projectId = card.dataset.projectId || selectedProjectId || '';
      try {
        await api('/api/active', {
          method:'POST',
          headers:{'content-type':'application/json'},
          body:JSON.stringify({ change:card.dataset.change, projectId:projectId || undefined }),
        });
      } catch(e) {}
      if (last?.mode === 'all' && projectId) {
        openProjectDetail(projectId);
        return;
      }
      refresh();
    };
  });
}

function workflowKey(w) {
  return [w?.source || '', w?.locale || '', w?.id || ''].join(':');
}
function workflowSourceLabel(source) {
  const labels = {
    builtin: { zh:'内置模板', en:'Builtin template' },
    user: { zh:'用户级', en:'User scope' },
    local: { zh:'项目级', en:'Project scope' },
    project: { zh:'项目级', en:'Project scope' },
  };
  return (labels[source] && labels[source][lang]) || source || '';
}
function workflowSourceHint(source) {
  const hints = {
    builtin: { zh:'插件内置模板只读；复制后可保存为自定义 workflow。', en:'Plugin built-in templates are read-only. Copy one to save a custom workflow.' },
    user: { zh:'保存到本机 Hikspine 用户目录，新项目也能加载。', en:'Saved in the local Hikspine user directory and available to new projects.' },
    local: { zh:'保存到当前项目 .hikspine/workflows。', en:'Saved to this project under .hikspine/workflows.' },
    project: { zh:'保存到当前项目 .hikspine/workflows。', en:'Saved to this project under .hikspine/workflows.' },
  };
  return (hints[source] && hints[source][lang]) || '';
}
function workflowConflictText(w) {
  const sources = Array.isArray(w?.conflictSources) ? w.conflictSources : [];
  if (!sources.length) return '';
  const names = sources.map(workflowSourceLabel).join(' / ');
  return lang === 'zh' ? '同名冲突：' + names : 'Name conflict: ' + names;
}
function isBuiltinWorkflow(w) {
  return w?.readonly || w?.source === 'builtin';
}
function selectedWorkflow(workflows) {
  workflows = Array.isArray(workflows) ? workflows : [];
  return workflows.find(w => workflowKey(w) === selectedWorkflowKey)
    || workflows.find(w => w.id === selectedWorkflowId)
    || workflows[0]
    || null;
}

// The workflow(s) to show in the project-detail sections: only the one the
// current task (active change) actually runs — not every available workflow.
// Falls back to all workflows when there is no identifiable current task.
function activeTaskWorkflows(state) {
  const all = Array.isArray(state?.workflows) ? state.workflows : [];
  const changes = Array.isArray(state?.changes) ? state.changes : [];
  const task = changes.find(c => c.active) || changes.find(c => c.change === state?.active) || changes[0] || null;
  if (!task || !task.workflow) return all;
  const byId = all.filter(w => w.id === task.workflow);
  if (!byId.length) return all;
  const bySource = task.workflowSource ? byId.filter(w => (w.source || '') === task.workflowSource) : [];
  return bySource.length ? bySource : byId;
}

function renderWorkflows(workflows) {
  workflows = Array.isArray(workflows) ? workflows : [];
  if (!workflows.length) {
    closeWorkflowCanvas(false);
    $('legend').innerHTML = '';
    $('workflowActionbar').hidden = true;
    $('workflowDetail').innerHTML = '<div class="empty">'+(lang==='zh'?'暂无工作流。':'No workflows found.')+'</div>';
    return;
  }
  const selected = selectedWorkflow(workflows);
  selectedWorkflowId = selected?.id || '';
  selectedWorkflowKey = selected ? workflowKey(selected) : '';
  $('legend').innerHTML = workflows.map(w=>{
    const key = workflowKey(w);
    const conflict = workflowConflictText(w);
    const sourceTag = w.source ? '<span class="tag" title="'+esc(workflowSourceHint(w.source))+'">'+esc(workflowSourceLabel(w.source))+(conflict?' !':'')+'</span>' : '';
    return '<button type="button" class="wf-chip '+(key===selectedWorkflowKey?'active':'')+'" data-workflow-key="'+esc(key)+'"><div class="id">'+esc(wfName(w))+
      '<span class="tag">'+esc(w.id)+'</span>'+sourceTag+'</div><div class="it">'+esc(conflict || wfIntent(w))+'</div></button>';
  }).join('');
  $('legend').querySelectorAll('[data-workflow-key]').forEach(btn => {
    btn.onclick = () => {
      selectedWorkflowKey = btn.dataset.workflowKey;
      selectedWorkflowId = (workflows.find(w => workflowKey(w) === selectedWorkflowKey) || {}).id || '';
      canvasWorkflow = null;
      canvasSourceId = '';
      canvasSourceKey = '';
      canvasDirty = false;
      localStorage.setItem('hikspine-workflow', selectedWorkflowId);
      localStorage.setItem('hikspine-workflow-key', selectedWorkflowKey);
      renderWorkflows(workflows);
    };
  });
  renderWorkflowDetail(workflows);
  renderWorkflowActionbar(selected);
  if (canvasOpen) renderWorkflowCanvas(workflows);
}

function capId(c) {
  return typeof c === 'string' ? c : (c?.id || '');
}
function capMode(c) {
  if (!c || typeof c === 'string') return 'optional';
  if (c.group && c.when) return 'one-of-when';
  if (c.group) return 'one-of';
  if (c.when) return 'when';
  if (c.required) return 'required';
  return 'optional';
}
function makeCapability(id, mode, group, when) {
  id = String(id || '').trim();
  if (!id) return null;
  mode = String(mode || 'optional');
  const out = { id };
  if (mode === 'required') out.required = true;
  if (mode === 'one-of' || mode === 'one-of-when') out.group = String(group || '').trim();
  if (mode === 'when' || mode === 'one-of-when') out.when = String(when || '').trim();
  Object.keys(out).forEach(k => { if (out[k] === '') delete out[k]; });
  return Object.keys(out).length === 1 ? id : out;
}
function capabilityModeLabel(mode) {
  const zh = {

    '<button class="canvas-btn" id="canvasNewBlank" type="button">'+(lang==='zh'?'新建空白':'New blank')+'</button>'+
    '<button class="canvas-btn" id="canvasCopySelected" type="button">'+(lang==='zh'?'复制当前':'Copy selected')+'</button>'+
    '<button class="canvas-btn '+(canvasInspectorMode==='workflow'?'active':'')+'" id="canvasWorkflowSettings" type="button">'+(lang==='zh'?'工作流设置':'Workflow settings')+'</button>'+
    '<button class="canvas-btn primary" id="canvasSave" type="button" '+(canvasReadOnly?'disabled':'')+'>'+(lang==='zh'?'保存自定义 workflow':'Save custom workflow')+'</button>'+
    '<span class="canvas-status" id="canvasStatus" title="'+esc(sourceNote)+'">'+esc(statusText)+'</span></div>'+
    '<div class="canvas-main '+(canvasInspectorOpen?'':'inspector-closed')+'"><div class="canvas-board" style="min-height:'+boardH+'px">'+
    '<svg class="canvas-svg" width="'+boardW+'" height="'+boardH+'" viewBox="0 0 '+boardW+' '+boardH+'"><defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="rgba(98,210,162,.72)"></path></marker></defs>'+edges+'</svg>'+nodes+'</div>'+
    '<aside class="canvas-inspector"><div class="canvas-inspector-head"><h3>'+esc(inspectorTitle)+'</h3><button class="canvas-panel-close" id="canvasInspectorCollapse" type="button">'+(lang==='zh'?'收起':'Collapse')+'</button></div>'+
    inspectorBody+'<div class="canvas-errors">'+esc(errors.join('\n'))+'</div></aside></div>';
  host.querySelectorAll('[data-canvas-stage]').forEach(btn => {
    btn.onclick = () => {
      selectedCanvasStage = btn.dataset.canvasStage;
      canvasInspectorMode = 'stage';
      canvasInspectorOpen = true;
      renderWorkflowCanvas(workflows);
    };
    btn.onkeydown = event => {
      if (event.target !== btn) return;
      if (event.key !== 'Enter' && event.key !== ' ') return;
      event.preventDefault();
      btn.click();
    };
  });
  host.querySelectorAll('[data-canvas-delete]').forEach(btn => btn.onclick = event => {
    event.stopPropagation();
    if (canvasReadOnly || states.length <= 1) return;
    deleteCanvasStage(btn.dataset.canvasDelete);
  });
  host.querySelectorAll('[data-canvas-add-after]').forEach(btn => btn.onclick = event => {
    event.stopPropagation();
    if (canvasReadOnly) return;
    addCanvasStage(btn.dataset.canvasAddAfter);
  });
  const collapse = $('canvasInspectorCollapse');
  if (collapse) collapse.onclick = () => {
    canvasInspectorOpen = false;
    renderWorkflowCanvas(workflows);
  };
  $('canvasWorkflowSettings').onclick = () => {
    canvasInspectorMode = 'workflow';
    canvasInspectorOpen = true;
    renderWorkflowCanvas(workflows);
  };
  $('canvasSaveScope').onchange = (event) => {
    canvasSaveScope = event.target.value === 'local' ? 'local' : 'user';
    localStorage.setItem('hikspine-workflow-save-scope', canvasSaveScope);
    renderWorkflowCanvas(workflows);
  };
  $('canvasNewBlank').onclick = () => {
    canvasWorkflow = newBlankWorkflow();
    canvasSourceId = 'blank:' + canvasWorkflow.id;
    canvasSourceKey = JSON.stringify(canvasWorkflow);
    canvasReadOnly = false;
    selectedCanvasStage = canvasWorkflow.start;
    canvasInspectorMode = 'workflow';
    canvasInspectorOpen = true;
    markCanvasDirty(true);
  };
  $('canvasCopySelected').onclick = () => {
    const source = selectedWorkflow(last?.workflows || []);
    if (!source) return;
    canvasWorkflow = workflowToCanvas(source);
    canvasWorkflow.id = uniqueWorkflowId(`${source.id || 'workflow'}-custom`);
    canvasWorkflow.name = (lang === 'zh' ? '自定义 ' : 'Custom ') + (source.name || source.id || 'Workflow');
    canvasSourceId = 'copy:' + workflowKey(source);
    canvasSourceKey = JSON.stringify(source);
    canvasReadOnly = false;
    if (source.source === 'user' || source.source === 'local') canvasSaveScope = source.source;
    else canvasSaveScope = 'user';
    localStorage.setItem('hikspine-workflow-save-scope', canvasSaveScope);
    selectedCanvasStage = canvasWorkflow.start || canvasWorkflow.states[0]?.id || '';
    canvasInspectorMode = 'workflow';
    canvasInspectorOpen = true;
    markCanvasDirty(true);
  };
  $('canvasSave').onclick = saveCanvasWorkflow;
  const bind = (id, fn) => {
    const el = $(id);
    if (!el) return;
    if (canvasReadOnly) {
      el.disabled = true;
      return;
    }
    el.oninput = () => { fn(el); markCanvasDirty(false); };
    el.onchange = () => { fn(el); markCanvasDirty(true); };
  };
  bind('cwId', el => { w.id = el.value.trim(); });
  bind('cwName', el => { w.name = el.value; });
  bind('cwIntent', el => { w.intent = el.value; });
  bind('cwStart', el => { w.start = el.value; });
  bind('csId', el => {
    const old = current.id;
    current.id = el.value.trim();
    for (const s of states) if (s.next === old) s.next = current.id;
    if (w.start === old) w.start = current.id;
    selectedCanvasStage = current.id;
  });
  bind('csGoal', el => { current.goal = el.value; });
  bind('csRules', el => { current.rules = parseLines(el.value); });
  const csRulesExpand = $('csRulesExpand');
  if (csRulesExpand) {
    csRulesExpand.disabled = canvasReadOnly;
    if (!canvasReadOnly) csRulesExpand.onclick = openRulesModal;
  }
  bind('csNext', el => { current.next = el.value; current.terminal = !el.value ? current.terminal : false; });
  bind('csUser', el => { current.requires_user = el.checked; });
  bind('csTerminal', el => { current.terminal = el.checked; if (el.checked) current.next = ''; });
  const decisionEditor = $('csNeedsEditor');
  if (decisionEditor && current) {
    if (canvasReadOnly) decisionEditor.querySelectorAll('input,select,button').forEach(el => { el.disabled = true; });
    const syncNeeds = (rerender = false) => {
      if (canvasReadOnly) return;
      current.needs = readDecisionEditor();
      markCanvasDirty(rerender);
    };
    decisionEditor.querySelectorAll('[data-decision-key],[data-decision-value]').forEach(el => {
      el.oninput = () => syncNeeds(false);
      el.onchange = () => syncNeeds(false);
    });
    decisionEditor.querySelectorAll('[data-decision-op]').forEach(el => {
      el.onchange = () => syncNeeds(true);
    });
    decisionEditor.querySelectorAll('[data-decision-delete]').forEach(btn => {
      btn.disabled = canvasReadOnly;
      btn.onclick = () => {
        if (canvasReadOnly) return;
        current.needs.splice(Number(btn.dataset.decisionDelete), 1);
        markCanvasDirty(true);
      };
    });
    const addDecision = $('decisionAdd');
    if (addDecision) addDecision.disabled = canvasReadOnly;
    if (addDecision) addDecision.onclick = () => {
      if (canvasReadOnly) return;
      current.needs.push('decision_ready');
      markCanvasDirty(true);
    };
  }
  const capEditor = $('csCapsEditor');
  if (capEditor && current) {
    if (canvasReadOnly) capEditor.querySelectorAll('input,select,button').forEach(el => { el.disabled = true; });
    const syncCaps = (rerender = false) => {
      if (canvasReadOnly) return;
      current.capabilities = readCapabilityEditor();
      markCanvasDirty(rerender);
    };
    capEditor.querySelectorAll('[data-cap-id],[data-cap-group],[data-cap-when]').forEach(el => {
      el.oninput = () => syncCaps(false);
      el.onchange = () => syncCaps(false);
    });
    capEditor.querySelectorAll('[data-cap-mode]').forEach(el => {
      el.onchange = () => syncCaps(true);
    });
    capEditor.querySelectorAll('[data-cap-delete]').forEach(btn => {
      btn.disabled = canvasReadOnly;
      btn.onclick = () => {
        if (canvasReadOnly) return;
        current.capabilities.splice(Number(btn.dataset.capDelete), 1);
        markCanvasDirty(true);
      };
    });
    const add = $('capAdd');
    if (add) add.disabled = canvasReadOnly;
    if (add) add.onclick = () => {
      if (canvasReadOnly) return;
      const firstSkill = skillOptions()[0] || 'skill-name';
      current.capabilities.push(firstSkill);
      markCanvasDirty(true);
    };
  }
}

let skillPage = 1;
const SKILL_PAGE_SIZE = 12;
function skillSort(a, b) {
  const da = SCOPE_ORDER.indexOf(scopeOf(a)), db = SCOPE_ORDER.indexOf(scopeOf(b));
  if (da !== db) return da - db;
  return String(a.name).localeCompare(String(b.name));
}
function renderSkills(skills) {
  skills = Array.isArray(skills) ? skills : [];
  const counts = new Map(SCOPE_ORDER.map(scope => [scope, 0]));
  skills.forEach(s => counts.set(scopeOf(s), (counts.get(scopeOf(s)) || 0) + 1));
  const sorted = [...skills].sort(skillSort);
  const pageCount = Math.max(1, Math.ceil(sorted.length / SKILL_PAGE_SIZE));
  skillPage = Math.max(1, Math.min(skillPage, pageCount));
  const start = (skillPage - 1) * SKILL_PAGE_SIZE;
  const pageItems = sorted.slice(start, start + SKILL_PAGE_SIZE);
  const summary = SCOPE_ORDER.map(scope =>
    '<span class="scope-pill">'+esc(SCOPE[scope][lang])+' <b>'+counts.get(scope)+'</b></span>'
  ).join('');
  const cards = pageItems.length ? pageItems.map(s => {
    const scope = scopeOf(s);
    return '<article class="skill-card" title="'+esc(skillDesc(s)+'\\n'+(s.path||''))+'">'+
      '<div class="skill-card-head"><div class="skill-name">'+esc(s.name)+'</div><span class="skill-scope-tag">'+esc(SCOPE[scope][lang])+'</span></div>'+
      '<div class="skill-field"><div class="k">'+t('fSource')+'</div><div class="v">'+esc(SCOPE_HELP[scope][lang])+'</div></div>'+
      '<div class="skill-field desc"><div class="k">'+t('fDesc')+'</div><div class="v">'+esc(skillDesc(s))+'</div></div>'+
      '<div class="skill-field"><div class="k">'+t('fUsage')+'</div><div class="v">'+esc(skillUsage(s))+'</div></div>'+
      '<div class="skill-field path"><div class="k">'+t('fPath')+'</div><div class="v">'+esc(s.path || '')+'</div></div>'+
    '</article>';
  }).join('') : '<div class="skill-empty">'+t('noSkills')+'</div>';
  $('skills').innerHTML =
    '<div class="skill-toolbar"><div class="skill-total"><b>'+skills.length+'</b> '+t('skTotal')+'</div>'+
    '<div class="skill-pages"><button id="skillPrev" '+(skillPage<=1?'disabled':'')+'>'+t('prev')+'</button>'+
    '<span>'+t('page')(skillPage, pageCount, SKILL_PAGE_SIZE)+'</span>'+
    '<button id="skillNext" '+(skillPage>=pageCount?'disabled':'')+'>'+t('next')+'</button></div></div>'+
    '<div class="scope-summary">'+summary+'</div>'+
    '<div class="skill-cards">'+cards+'</div>';
  $('skillPrev').onclick = () => { if (skillPage > 1) { skillPage -= 1; renderSkills(skills); } };
  $('skillNext').onclick = () => { if (skillPage < pageCount) { skillPage += 1; renderSkills(skills); } };
}

const NTYPE = { permission_prompt:'nPermission', idle_prompt:'nIdle', elicitation_dialog:'nElicit' };
let lastNotifiedAt = 0, notifPrimed = false;
let noticeOpen = false, noticeToastId = '', noticeToastTimer = 0;
const noticeType = (type) => (NTYPE[type] ? t(NTYPE[type]) : type);

function notificationRow(n, handled) {
  return '<div class="notice-item '+(handled ? 'handled' : '')+'">'+
    '<div class="notice-line"><div class="notice-type">'+esc(noticeType(n.type))+(handled ? ' · '+t('nHandled') : '')+'</div>'+
    (n.message ? '<div class="notice-msg">'+esc(n.message)+'</div>' : '')+
    '<div class="notice-meta">'+esc(relTime(n.at))+(n.handledAt ? ' · '+esc(relTime(n.handledAt)) : '')+'</div></div>'+
    (handled ? '' : '<button class="notice-btn notice-done" data-notice-id="'+esc(n.id)+'" type="button">'+t('nMarkDone')+'</button>')+
    '</div>';
}

function noticeToast(n) {
  return '<div class="notice-type">'+esc(noticeType(n.type))+'</div>'+
    (n.message ? '<div class="notice-msg">'+esc(n.message)+'</div>' : '')+
    '<div class="notice-meta">'+esc(relTime(n.at))+'</div>';
}

function showNoticeToast(n) {
  const toast = $('noticeToast');
  if (!n || noticeOpen || noticeToastId === n.id) return;
  noticeToastId = n.id;
  toast.innerHTML = noticeToast(n);
  toast.hidden = false;
  toast.onclick = () => { noticeOpen = true; toast.hidden = true; renderNotifications(last?.notifications || []); };
  clearTimeout(noticeToastTimer);
  noticeToastTimer = setTimeout(() => { toast.hidden = true; }, 6500);
}

function renderNotifications(notifications) {
  const dock = $('noticeDock');
  const panel = $('noticePanel');
  const fab = $('noticeFab');
  const toast = $('noticeToast');
  const all = (notifications || [])
    .filter(n => n && n.at)
    .slice()
    .sort((a,b)=>new Date(a.at).getTime()-new Date(b.at).getTime());
  if (!all.length) {
    dock.hidden = true;
    panel.hidden = true;
    toast.hidden = true;
    noticeOpen = false;
    return;
  }
  const pending = all.filter(n => !n.handledAt);
  const handled = all.filter(n => n.handledAt).slice(-3).reverse();
  const rows = pending.length
    ? pending.concat(handled).map(n => notificationRow(n, !!n.handledAt)).join('')
    : '<div class="notice-empty">'+t('nEmpty')+'</div>'+handled.map(n => notificationRow(n, true)).join('');
  dock.hidden = false;
  fab.classList.toggle('has-pending', pending.length > 0);
  fab.innerHTML = '!'+(pending.length ? '<span class="notice-count">'+pending.length+'</span>' : '');
  fab.title = t('notice');
  fab.onclick = () => {
    noticeOpen = !noticeOpen;
    toast.hidden = true;
    renderNotifications(last?.notifications || []);
  };
  panel.hidden = !noticeOpen;
  panel.innerHTML =
    '<div class="notice-head"><div class="notice-mark">!</div>'+
    '<div class="notice-copy"><div class="notice-title">'+t('notice')+'</div>'+
    '<div class="notice-sub">'+t('noticeSub')(pending.length, all.length-pending.length)+'</div></div>'+
    '<div class="notice-actions">'+
    '<button class="notice-btn" id="noticeDoneAll" type="button" '+(!pending.length?'disabled':'')+'>'+t('nMarkAll')+'</button>'+
    '<button class="notice-btn notice-close" id="noticeClose" type="button" title="'+t('nClose')+'">×</button>'+
    '</div></div>'+
    '<div class="notice-list">'+rows+'</div>';
  $('noticeDoneAll').onclick = () => markNotifications({ all:true });
  $('noticeClose').onclick = () => { noticeOpen = false; panel.hidden = true; };
  panel.querySelectorAll('.notice-done').forEach((button) => {
    button.onclick = () => markNotifications({ id: button.dataset.noticeId });
  });
  const latest = pending[pending.length - 1];
  if (latest) {
    const latestMs = new Date(latest.at).getTime();
    if (notifPrimed && latestMs > lastNotifiedAt) showNoticeToast(latest);
    if (notifPrimed && latestMs > lastNotifiedAt && 'Notification' in window && Notification.permission === 'granted') {
      try { new Notification(t('notice'), { body: latest.message || noticeType(latest.type) }); } catch (e) {}
    }
    lastNotifiedAt = Math.max(lastNotifiedAt, latestMs);
  }
  notifPrimed = true;
}

async function markNotifications(payload) {
  try {
    await api('/api/notifications/handled', {
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify(payload),
    });
  } catch (e) {}
  refresh();
}

function renderAll() {
  if (!last) return;
  const replayEnterAnimation = !hasRendered;
  document.body.classList.toggle('no-enter-animation', !replayEnterAnimation);
  document.documentElement.lang = (lang==='zh') ? 'zh-CN' : 'en';
  $('title').textContent = t('title');
  $('subtitle').textContent = t('subtitle');
  const allMode = last.mode === 'all';
  $('secTasks').textContent = allMode ? t('secTasks') : t('secProjectTasks');
  $('secBuild').textContent = t('secBuild');
  $('secWf').textContent = t('secWf');
  $('secMetrics').textContent = allMode ? t('secMetrics') : t('secProjectMetrics');
  $('secWorkflowDetail').textContent = lang==='zh' ? '工作流阶段与技能' : 'Workflow stages & skills';
  $('root').textContent = last.root ? '  ·  '+last.root : '';
  if (allMode) $('root').textContent = '  ·  '+(lang==='zh'?'所有已登记项目':'all registered projects');
  else if (last.fromAll) $('root').textContent = '  ·  '+(last.projectName || last.root || '');
  const backBtn = $('backBtn');
  backBtn.textContent = t('backAll');
  backBtn.hidden = true;
  $('workflowStudioBtn').textContent = lang === 'zh' ? 'Workflow 编排' : 'Workflows';
  renderScopeBar();
  // Global overview: show aggregate KPIs and the project grid; the per-project
  // panels (build info, workflows, stages & skills) belong to a single project
  // and are shown only when drilled into one.
  $('stats').hidden = true;
  $('secMetrics').hidden = false;
  $('metricsPanel').hidden = false;
  $('timingPanel').hidden = false;
  $('secBuild').hidden = allMode;
  $('projectBuild').hidden = allMode;
  $('secWf').hidden = allMode;
  $('legend').hidden = allMode;
  $('secWorkflowDetail').hidden = allMode;
  $('workflowActionbar').hidden = true;
  $('workflowDetail').hidden = allMode;
  if (allMode) closeWorkflowCanvas(false);
  $('dot').className = 'dot' + (last.demo?' demo':'');
  $('livetext').textContent = last.demo ? t('demo') : t('live');
  $('lzh').classList.toggle('on', lang==='zh');
  $('len').classList.toggle('on', lang==='en');
  const quitBtn = $('quitBtn');
  quitBtn.textContent = t('quit');
  quitBtn.hidden = !!last.demo;   // only a live board can be stopped
  renderNotifications(last.notifications || []);
  if (last.loading) {
    renderProjectMetrics(last);
    renderTiming(last, { showTaskCount: false });
    $('changes').innerHTML = '<div class="empty">'+esc(t('loadingProject'))+'</div>';
    $('projectBuild').innerHTML = '<div class="need">'+esc(t('loadingProject'))+'</div>';
    $('legend').innerHTML = '';
    $('workflowDetail').innerHTML = '<div class="empty">'+esc(t('loadingProject'))+'</div>';
    renderProjects([]);
    hasRendered = true;
    document.body.classList.add('no-enter-animation');
    return;
  }
  if (allMode) {
    renderMetrics(last);
    renderTiming(last, { showTaskCount: true });
    // Overview task list focuses on in-progress work — completed / archived
    // changes are counted in the metrics, not listed as "in-progress".
    const active = (last.changes || []).filter(c => c.error || (!c.complete && !c.archived));
    renderChanges(active, t('emptyActive'));
  } else {
    renderProjectMetrics(last);
    renderTiming(last, { showTaskCount: false });
    renderChanges(last.changes || []);
    renderProjectBuild(last.projectBuild);
    renderWorkflows(activeTaskWorkflows(last));
  }
  renderProjects(last.projects || []);
  hasRendered = true;
  document.body.classList.add('no-enter-animation');
}

function setLang(l) {
  lang = l; localStorage.setItem('hikspine-lang', l); lastRenderKey = ''; renderAll();
}
$('lzh').onclick = () => setLang('zh');
$('len').onclick = () => setLang('en');
$('quitBtn').onclick = async () => {
  if (!confirm(t('quitConfirm'))) return;
  try {
    await api('/api/shutdown', { method:'POST' });
    if (pollTimer) clearInterval(pollTimer);
    $('dot').className = 'dot';
    $('livetext').textContent = t('quitDone');
    $('quitBtn').hidden = true;
  } catch (e) {
    alert(t('quitFail'));
  }
};
$('backBtn').onclick = goProjectOverview;
$('workflowStudioBtn').onclick = () => {
  const target = selectedProjectId ? '/workflows?projectId=' + encodeURIComponent(selectedProjectId) : '/workflows';
  location.href = target;
};
$('artifactClose').onclick = closeArtifact;
$('artifactModal').onclick = (event) => { if (event.target.id === 'artifactModal') closeArtifact(); };
$('canvasOpen').onclick = openWorkflowCanvas;
$('canvasClose').onclick = () => closeWorkflowCanvas(false);
$('workflowCanvasModal').onclick = (event) => { if (event.target.id === 'workflowCanvasModal') closeWorkflowCanvas(false); };
$('rulesModalClose').onclick = closeRulesModal;
$('rulesModalCancel').onclick = closeRulesModal;
$('rulesModalSave').onclick = saveRulesModal;
$('rulesAdd').onclick = () => { rulesDraft.push(''); renderRulesList(); focusLastRule(); };
$('rulesModal').onclick = (event) => { if (event.target.id === 'rulesModal') closeRulesModal(); };

function needsFastPoll(state) {
  const changes = Array.isArray(state?.changes) ? state.changes : [];
  const notifications = Array.isArray(state?.notifications) ? state.notifications : [];
  return notifications.some(n => !n.handled && !n.handledAt)
    || changes.some(c => c.error || (!c.complete && !c.archived));
}
function nextPollDelay() {
  if (document.hidden) return HIDDEN_POLL_MS;
  return needsFastPoll(last) ? ACTIVE_POLL_MS : IDLE_POLL_MS;
}
function scheduleRefresh(delay = nextPollDelay()) {
  if (pollTimer) clearTimeout(pollTimer);
  pollTimer = setTimeout(() => refresh(), delay);
}

async function refresh(options = {}) {
  if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
  // Only the newest refresh may apply. Clicking a project starts a fresh
  // refresh; any slower in-flight poll (e.g. an overview fetch begun before the
  // click) must NOT overwrite the drill-in view when it finally resolves.
  const seq = ++refreshSeq;
  const projectIdAtStart = selectedProjectId;
  const labelsPromise = loadUiLabels(projectIdAtStart);
  let s;
  if (projectIdAtStart) {
    // Drill-in: fetch only this project's board. Project list backfill runs in
    // the background and never blocks the detail page.
    ensureProjectOptions();
    const fastParam = options.fast ? '&fast=1' : '';
    try { s = await api('/api/state?projectId='+encodeURIComponent(projectIdAtStart)+fastParam); }
    catch (e) { s = null; }
    if (!s || s.error) { selectedProjectId = null; try { s = await api('/api/state'); } catch (e2) { s = DEMO; } }
  } else {
    try { s = await api('/api/state'); } catch (e) { s = DEMO; }
    if (s && s.mode === 'all') {
      projectOptions = Array.isArray(s.projects) ? s.projects : [];
    }
  }
  const labels = await labelsPromise;
  if (seq !== refreshSeq) return;   // a newer refresh started while we awaited — drop this stale result
  uiLabels = labels && typeof labels === 'object' ? labels : { stages:{} };
  if (!s.demo && (!s.changes)) s.demo = true;
  const renderKey = JSON.stringify(s) + '|' + JSON.stringify(uiLabels) + '|' + lang + '|' + Math.floor(Date.now() / 60000);
  if (renderKey !== lastRenderKey) {
    lastRenderKey = renderKey;
    last = s;
    renderAll();
  }
  if (s?.fast && selectedProjectId === projectIdAtStart) {
    setTimeout(() => refresh({ full:true }), 0);
  } else {
    scheduleRefresh();
  }
}

if ('Notification' in window && Notification.permission === 'default') {
  try { Notification.requestPermission(); } catch (e) {}
}
refresh();
document.addEventListener('visibilitychange', () => {
  if (document.hidden) scheduleRefresh(HIDDEN_POLL_MS);
  else refresh();
});
</script>
