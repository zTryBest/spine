<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hikspine</title>
<style>
  :root {
    --bg:#070a10; --bg2:#0c1019; --panel:#121724; --panel2:#1a2030; --line:#262d3e; --line2:#323a4e;
    --text:#eef1f8; --muted:#8b94a8; --dim:#586073;
    --accent:#6ea8fe; --accent2:#9a7bff; --work:#3fd07a; --confirm:#f0c64a; --done:#9a7bff; --err:#ff6b63;
    --shadow:0 18px 50px -28px rgba(0,0,0,.9);
  }
  * { box-sizing:border-box; }
  html,body { margin:0; min-height:100%; }
  body {
    background:
      radial-gradient(1100px 520px at 88% -12%, rgba(110,168,254,.16), transparent 60%),
      radial-gradient(900px 480px at 5% 0%, rgba(154,123,255,.12), transparent 55%),
      var(--bg);
    color:var(--text);
    font:14px/1.55 "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:1180px; margin:0 auto; padding:30px 26px 70px; }

  header { display:flex; align-items:center; gap:14px; }
  .logo { width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid; place-items:center; font-weight:800; color:#070a10; font-size:18px; box-shadow:0 6px 18px -6px var(--accent); }
  .title h1 { font-size:19px; margin:0; letter-spacing:.2px; }
  .title .t2 { color:var(--muted); font-size:12px; }
  .root { margin-left:4px; color:var(--dim); font-size:11.5px; font-family:ui-monospace,monospace; }
  .hbar { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .live { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:12px;
    background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:6px 12px; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--work); animation:pulse 2.2s infinite; }
  .dot.demo { background:var(--confirm); }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(63,208,122,.55)} 70%{box-shadow:0 0 0 8px rgba(63,208,122,0)} 100%{box-shadow:0 0 0 0 rgba(63,208,122,0)} }
  .lang { display:flex; background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:3px; gap:2px; }
  .lang button { font:inherit; font-size:12px; color:var(--muted); background:transparent; border:none; border-radius:999px; padding:4px 11px; cursor:pointer; }
  .lang button.on { color:#070a10; background:linear-gradient(135deg,var(--accent),var(--accent2)); font-weight:700; }

  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:22px 0 8px; }
  .stat { background:linear-gradient(180deg,var(--panel),var(--bg2)); border:1px solid var(--line);
    border-radius:14px; padding:14px 16px; position:relative; overflow:hidden; }
  .stat::after { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--dim); }
  .stat.work::after{background:var(--work)} .stat.confirm::after{background:var(--confirm)} .stat.done::after{background:var(--done)} .stat.total::after{background:var(--accent)}
  .stat .n { font-size:26px; font-weight:750; line-height:1; }
  .stat.work .n{color:var(--work)} .stat.confirm .n{color:var(--confirm)} .stat.done .n{color:#b9a6ff}
  .stat .l { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.7px; margin-top:7px; }

  h2 { font-size:11.5px; text-transform:uppercase; letter-spacing:1.4px; color:var(--muted); margin:30px 0 14px; font-weight:600; }

  .cards { display:grid; gap:15px; grid-template-columns:repeat(auto-fill, minmax(440px,1fr)); }
  .card { background:linear-gradient(180deg,var(--panel),var(--bg2)); border:1px solid var(--line);
    border-radius:16px; padding:18px 20px 16px; box-shadow:var(--shadow); animation:rise .4s ease both; }
  @keyframes rise { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }
  .card.active { border-color:rgba(110,168,254,.55); box-shadow:0 0 0 1px rgba(110,168,254,.35), var(--shadow); }
  .card .top { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .card .name { font-weight:700; font-size:16px; }
  .card .wf { color:var(--muted); font-size:11.5px; font-family:ui-monospace,monospace;
    background:var(--panel2); border:1px solid var(--line2); border-radius:6px; padding:2px 8px; }
  .star { color:var(--accent); }
  .badge { margin-left:auto; font-size:10.5px; padding:4px 11px; border-radius:999px; font-weight:700; letter-spacing:.5px; }
  .badge.work{background:rgba(63,208,122,.15);color:var(--work)} .badge.confirm{background:rgba(240,198,74,.15);color:var(--confirm)}
  .badge.done{background:rgba(154,123,255,.18);color:#b9a6ff} .badge.error{background:rgba(255,107,99,.15);color:var(--err)}

  .pipe { display:flex; align-items:flex-start; margin:6px 2px 14px; }
  .step { display:flex; align-items:center; flex:1; min-width:0; }
  .step:last-child { flex:0 0 auto; }
  .node { display:flex; flex-direction:column; align-items:center; gap:7px; width:46px; }
  .bub { width:30px; height:30px; border-radius:50%; display:grid; place-items:center; font-size:12.5px; font-weight:700;
    background:var(--panel2); border:2px solid var(--line2); color:var(--dim); transition:.3s; }
  .node.done .bub { background:linear-gradient(135deg,var(--work),#2fae63); border-color:transparent; color:#06210f; }
  .node.curr .bub { border-color:var(--accent); color:var(--accent); background:rgba(110,168,254,.08); animation:ring 2s infinite; }
  .node.curr.cf .bub { border-color:var(--confirm); color:var(--confirm); animation:ringc 2s infinite; }
  @keyframes ring { 0%{box-shadow:0 0 0 0 rgba(110,168,254,.5)} 70%{box-shadow:0 0 0 7px rgba(110,168,254,0)} 100%{box-shadow:0 0 0 0 rgba(110,168,254,0)} }
  @keyframes ringc { 0%{box-shadow:0 0 0 0 rgba(240,198,74,.5)} 70%{box-shadow:0 0 0 7px rgba(240,198,74,0)} 100%{box-shadow:0 0 0 0 rgba(240,198,74,0)} }
  .node .lbl { font-size:11px; color:var(--muted); white-space:nowrap; }
  .node.curr .lbl { color:var(--text); font-weight:600; }
  .node.done .lbl { color:#7fd6a3; }
  .bar { flex:1; height:3px; border-radius:2px; background:var(--line2); margin:0 3px; margin-top:13px; }
  .bar.done { background:linear-gradient(90deg,var(--work),#2fae63); }

  .foot { display:flex; gap:18px; flex-wrap:wrap; color:var(--muted); font-size:12px; border-top:1px solid var(--line); padding-top:11px; margin-top:2px; }
  .foot b { color:var(--text); font-weight:500; }
  .card.clickable { cursor:pointer; }

  .tl { margin-top:13px; border-top:1px solid var(--line); padding-top:11px; }
  .tl-head { color:var(--dim); font-size:10.5px; text-transform:uppercase; letter-spacing:.8px; margin-bottom:9px; display:flex; gap:8px; }
  .tl-head b { color:var(--muted); font-weight:600; }
  .tl-item { display:flex; align-items:center; gap:9px; padding:3px 0; font-size:12px; }
  .tl-rail { width:9px; flex:0 0 auto; display:flex; justify-content:center; }
  .tl-dot { width:8px; height:8px; border-radius:50%; background:var(--dim); box-shadow:0 0 0 3px rgba(255,255,255,.02); }
  .tl-dot.start{background:var(--accent)} .tl-dot.move{background:#7aa7ff} .tl-dot.ok{background:var(--work)}
  .tl-dot.fail{background:var(--err)} .tl-dot.done{background:var(--done)}
  .tl-text { color:var(--text); }
  .tl-text .k { color:var(--muted); font-family:ui-monospace,monospace; font-size:11px; }
  .tl-time { margin-left:auto; color:var(--dim); font-size:11px; white-space:nowrap; }

  .legend { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:12px; }
  .wf-chip { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 14px; }
  .wf-chip .id { font-weight:700; font-size:13.5px; display:flex; align-items:center; gap:7px; }
  .wf-chip .tag { font-size:10px; color:var(--dim); font-family:ui-monospace,monospace; border:1px solid var(--line2); border-radius:5px; padding:0 5px; }
  .wf-chip .it { color:var(--muted); font-size:12px; margin-top:5px; }
  .skill-toolbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; color:var(--muted); font-size:12px; flex-wrap:wrap; }
  .skill-total b { color:var(--text); font-weight:700; }
  .skill-pages { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:12px; }
  .skill-pages button { font:inherit; color:var(--text); background:var(--panel2); border:1px solid var(--line2); border-radius:8px; padding:5px 10px; cursor:pointer; }
  .skill-pages button:disabled { opacity:.42; cursor:not-allowed; }
  .scope-summary { display:flex; gap:8px; flex-wrap:wrap; margin:0 0 12px; }
  .scope-pill { color:var(--muted); background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:5px 9px; font-size:11px; }
  .scope-pill b { color:var(--text); font-weight:700; }
  .skill-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:12px; }
  .skill-card { background:linear-gradient(180deg,var(--panel),var(--bg2)); border:1px solid var(--line); border-radius:12px; padding:13px 14px; min-width:0; }
  .skill-card-head { display:flex; align-items:center; gap:9px; min-width:0; }
  .skill-name { font-weight:760; color:var(--text); font-size:13.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .skill-scope-tag { margin-left:auto; flex:0 0 auto; color:#b9c6dc; background:var(--panel2); border:1px solid var(--line2); border-radius:999px; padding:2px 8px; font-size:10.5px; }
  .skill-field { margin-top:9px; min-width:0; }
  .skill-field .k { color:var(--dim); font-size:10.5px; letter-spacing:.8px; text-transform:uppercase; margin-bottom:2px; }
  .skill-field .v { color:var(--muted); font-size:12px; overflow-wrap:anywhere; }
  .skill-field.desc .v { color:#b9c0d2; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .skill-field.path .v { color:var(--dim); font-family:ui-monospace,monospace; font-size:10.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .skill-empty { padding:14px 13px; color:var(--dim); font-size:12px; font-style:italic; }
  .empty { color:var(--dim); font-style:italic; }
</style>
</head>

// ŌöĆŌöĆ render ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function relTime(at) {
  if (!at) return '';
  const d = Date.now() - new Date(at).getTime();
  if (d < 60000) return t('tNow');
  const m = Math.floor(d/60000); if (m < 60) return m + t('tMin');
  const h = Math.floor(d/3600000); if (h < 24) return h + t('tHour');
  return Math.floor(d/86400000) + t('tDay');
}
function evtLine(e) {
  if (e.type === 'started') return { dot:'start', html:t('evStarted') };
  if (e.type === 'transition') return { dot:'move', html:t('evEnter')+' <b>'+esc(label(e.to))+'</b>' };
  if (e.type === 'rollback') return { dot:'fail', html:t('evRollback')+' <b>'+esc(label(e.to))+'</b>' };
  if (e.type === 'complete') return { dot:'done', html:t('evDone') };
  if (e.type === 'decide') {
    const val = (e.value === true || e.value === 'true') ? '' : '='+esc(String(e.value));
    return { dot: e.value === 'fail' ? 'fail' : 'ok', html:t('evDecide')+' <span class="k">'+esc(e.key)+val+'</span>' };
  }
  return { dot:'', html:esc(e.type) };
}
function timeline(c) {
  const h = Array.isArray(c.history) ? c.history : [];
  if (!h.length) return '';
  const decided = c.decisions ? Object.keys(c.decisions).length : h.filter(e=>e.type==='decide').length;
  const startAt = c.startedAt || h[0].at;
  const items = h.slice(-5).reverse().map(e => {
    const x = evtLine(e);
    return '<div class="tl-item"><span class="tl-rail"><span class="tl-dot '+x.dot+'"></span></span>'+
      '<span class="tl-text">'+x.html+'</span><span class="tl-time">'+esc(relTime(e.at))+'</span></div>';
  }).join('');
  const head = '<div class="tl-head"><span>'+t('timeline')+'</span>'+
    (startAt?'<span>┬Ę '+t('started')+' <b>'+esc(relTime(startAt))+'</b></span>':'')+
    '<span>┬Ę '+t('recorded')+' <b>'+decided+'</b></span></div>';
  return '<div class="tl">'+head+items+'</div>';
}
function pipe(c) {
  if (c.error || !Array.isArray(c.stages)) return '';
  let h = '<div class="pipe">';
  c.stages.forEach((id,i) => {
    const isDone = c.complete ? true : i < c.stageIndex;
    const isCurr = !c.complete && i === c.stageIndex;
    const cls = isDone ? 'done' : (isCurr ? 'curr '+(c.nextAction==='confirm'?'cf':'') : '');
    h += '<div class="step"><div class="node '+cls+'"><div class="bub">'+(isDone?'Ō£ō':(i+1))+'</div><div class="lbl">'+esc(label(id))+'</div></div>';
    if (i < c.stages.length-1) h += '<div class="bar '+(isDone?'done':'')+'"></div>';
    h += '</div>';
  });
  return h+'</div>';
}
function badge(c) {
  if (c.error) return '<span class="badge error">'+t('bError')+'</span>';
  if (c.complete) return '<span class="badge done">'+t('bDone')+'</span>';
  return '<span class="badge '+c.nextAction+'">'+(c.nextAction==='confirm'?t('bConfirm'):t('bWork'))+'</span>';
}
function renderStats(changes) {
  const n = { work:0, confirm:0, done:0 };
  changes.forEach(c => { if (c.error) return; if (c.complete) n.done++; else n[c.nextAction]++; });
  $('stats').innerHTML =
    '<div class="stat total"><div class="n">'+changes.length+'</div><div class="l">'+t('stTotal')+'</div></div>'+
    '<div class="stat work"><div class="n">'+n.work+'</div><div class="l">'+t('stWork')+'</div></div>'+
    '<div class="stat confirm"><div class="n">'+n.confirm+'</div><div class="l">'+t('stConfirm')+'</div></div>'+
    '<div class="stat done"><div class="n">'+n.done+'</div><div class="l">'+t('stDone')+'</div></div>';
}
function renderChanges(changes) {
  if (!changes.length) { $('changes').innerHTML = '<div class="empty">'+t('empty')+'</div>'; return; }
  $('changes').innerHTML = changes.map(c => {
    if (c.error) return '<div class="card"><div class="top"><span class="name">'+esc(c.change)+'</span>'+badge(c)+'</div><div class="foot">'+esc(c.error)+'</div></div>';
    const missing = (c.missing && c.missing.length) ? c.missing.join(', ') : 'ŌĆö';
    const goal = goalText(c);
    return '<div class="card clickable'+(c.active?' active':'')+'" data-change="'+esc(c.change)+'">'+
      '<div class="top">'+(c.active?'<span class="star">Ōśģ</span>':'')+'<span class="name">'+esc(c.change)+'</span>'+
      '<span class="wf">'+esc(c.workflow)+'</span>'+badge(c)+'</div>'+
      pipe(c)+
      '<div class="foot"><span>'+t('cur')+' <b>'+esc(label(c.current))+'</b></span>'+
      (goal?'<span>'+esc(goal)+'</span>':'')+
      '<span>'+t('pending')+' <b>'+esc(missing)+'</b></span></div>'+timeline(c)+'</div>';
  }).join('');
  $('changes').querySelectorAll('.card.clickable').forEach(card => {
    card.onclick = async () => { try { await api('/api/active',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({change:card.dataset.change})}); } catch(e){} refresh(); };
  });
}
function renderWorkflows(workflows) {
  $('legend').innerHTML = workflows.map(w=>'<div class="wf-chip"><div class="id">'+esc(w.id)+
    (wfTag(w.id)?'<span class="tag">'+esc(wfTag(w.id))+'</span>':'')+'</div><div class="it">'+esc(wfIntent(w))+'</div></div>').join('');
}

let skillPage = 1;
const SKILL_PAGE_SIZE = 12;
function skillSort(a, b) {
  const da = SCOPE_ORDER.indexOf(scopeOf(a)), db = SCOPE_ORDER.indexOf(scopeOf(b));
  if (da !== db) return da - db;
  return String(a.name).localeCompare(String(b.name));
}
function renderSkills(skills) {
  skills = Array.isArray(skills) ? skills : [];
  const counts = new Map(SCOPE_ORDER.map(scope => [scope, 0]));
  skills.forEach(s => counts.set(scopeOf(s), (counts.get(scopeOf(s)) || 0) + 1));
  const sorted = [...skills].sort(skillSort);
  const pageCount = Math.max(1, Math.ceil(sorted.length / SKILL_PAGE_SIZE));
  skillPage = Math.max(1, Math.min(skillPage, pageCount));
  const start = (skillPage - 1) * SKILL_PAGE_SIZE;
  const pageItems = sorted.slice(start, start + SKILL_PAGE_SIZE);
  const summary = SCOPE_ORDER.map(scope =>
    '<span class="scope-pill">'+esc(SCOPE[scope][lang])+' <b>'+counts.get(scope)+'</b></span>'
  ).join('');
  const cards = pageItems.length ? pageItems.map(s => {
    const scope = scopeOf(s);
    return '<article class="skill-card" title="'+esc(skillDesc(s)+'\\n'+(s.path||''))+'">'+
      '<div class="skill-card-head"><div class="skill-name">'+esc(s.name)+'</div><span class="skill-scope-tag">'+esc(SCOPE[scope][lang])+'</span></div>'+
      '<div class="skill-field"><div class="k">'+t('fSource')+'</div><div class="v">'+esc(SCOPE_HELP[scope][lang])+'</div></div>'+
      '<div class="skill-field desc"><div class="k">'+t('fDesc')+'</div><div class="v">'+esc(skillDesc(s))+'</div></div>'+
      '<div class="skill-field"><div class="k">'+t('fUsage')+'</div><div class="v">'+esc(skillUsage(s))+'</div></div>'+
      '<div class="skill-field path"><div class="k">'+t('fPath')+'</div><div class="v">'+esc(s.path || '')+'</div></div>'+
    '</article>';
  }).join('') : '<div class="skill-empty">'+t('noSkills')+'</div>';
  $('skills').innerHTML =
    '<div class="skill-toolbar"><div class="skill-total"><b>'+skills.length+'</b> '+t('skTotal')+'</div>'+
    '<div class="skill-pages"><button id="skillPrev" '+(skillPage<=1?'disabled':'')+'>'+t('prev')+'</button>'+
    '<span>'+t('page')(skillPage, pageCount, SKILL_PAGE_SIZE)+'</span>'+
    '<button id="skillNext" '+(skillPage>=pageCount?'disabled':'')+'>'+t('next')+'</button></div></div>'+
    '<div class="scope-summary">'+summary+'</div>'+
    '<div class="skill-cards">'+cards+'</div>';
  $('skillPrev').onclick = () => { if (skillPage > 1) { skillPage -= 1; renderSkills(skills); } };
  $('skillNext').onclick = () => { if (skillPage < pageCount) { skillPage += 1; renderSkills(skills); } };
}

function renderAll() {
  if (!last) return;
  document.documentElement.lang = (lang==='zh') ? 'zh-CN' : 'en';
  $('title').textContent = t('title');
  $('subtitle').textContent = t('subtitle');
  $('secTasks').textContent = t('secTasks');
  $('secWf').textContent = t('secWf');
  $('secSkills').textContent = t('secSkills');
  $('root').textContent = last.root ? '  ┬Ę  '+last.root : '';
  $('dot').className = 'dot' + (last.demo?' demo':'');
  $('livetext').textContent = last.demo ? t('demo') : t('live');
  $('lzh').classList.toggle('on', lang==='zh');
  $('len').classList.toggle('on', lang==='en');
  renderStats(last.changes || []);
  renderChanges(last.changes || []);
  renderWorkflows(last.workflows || []);
  renderSkills(last.skills || []);
}

function setLang(l) {
  lang = l; localStorage.setItem('hikspine-lang', l); skillPage = 1; renderAll();
}
$('lzh').onclick = () => setLang('zh');
$('len').onclick = () => setLang('en');

async function refresh() {
  let s;
  try { s = await api('/api/state'); } catch (e) { s = DEMO; }
  if (!s.demo && (!s.changes)) s.demo = true;
  last = s;
  renderAll();
}

refresh();
setInterval(refresh, 2000);
