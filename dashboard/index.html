<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hikspine · 流水线看板</title>
<style>
  :root {
    --bg:#070a10; --bg2:#0c1019; --panel:#121724; --panel2:#1a2030; --line:#262d3e; --line2:#323a4e;
    --text:#eef1f8; --muted:#8b94a8; --dim:#586073;
    --accent:#6ea8fe; --accent2:#9a7bff; --work:#3fd07a; --confirm:#f0c64a; --done:#9a7bff; --err:#ff6b63;
    --shadow:0 18px 50px -28px rgba(0,0,0,.9);
  }
  * { box-sizing:border-box; }
  html,body { margin:0; min-height:100%; }
  body {
    background:
      radial-gradient(1100px 520px at 88% -12%, rgba(110,168,254,.16), transparent 60%),
      radial-gradient(900px 480px at 5% 0%, rgba(154,123,255,.12), transparent 55%),
      var(--bg);
    color:var(--text);
    font:14px/1.55 "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:1180px; margin:0 auto; padding:30px 26px 70px; }

  header { display:flex; align-items:center; gap:14px; }
  .logo { width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid; place-items:center; font-weight:800; color:#070a10; font-size:18px; box-shadow:0 6px 18px -6px var(--accent); }
  .title h1 { font-size:19px; margin:0; letter-spacing:.2px; }
  .title .t2 { color:var(--muted); font-size:12px; }
  .root { margin-left:4px; color:var(--dim); font-size:11.5px; font-family:ui-monospace,monospace; }
  .live { margin-left:auto; display:flex; align-items:center; gap:8px; color:var(--muted); font-size:12px;
    background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:6px 12px; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--work); animation:pulse 2.2s infinite; }
  .dot.demo { background:var(--confirm); }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(63,208,122,.55)} 70%{box-shadow:0 0 0 8px rgba(63,208,122,0)} 100%{box-shadow:0 0 0 0 rgba(63,208,122,0)} }

  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:22px 0 8px; }
  .stat { background:linear-gradient(180deg,var(--panel),var(--bg2)); border:1px solid var(--line);
    border-radius:14px; padding:14px 16px; position:relative; overflow:hidden; }
  .stat::after { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--dim); }
  .stat.work::after{background:var(--work)} .stat.confirm::after{background:var(--confirm)} .stat.done::after{background:var(--done)} .stat.total::after{background:var(--accent)}
  .stat .n { font-size:26px; font-weight:750; line-height:1; }
  .stat.work .n{color:var(--work)} .stat.confirm .n{color:var(--confirm)} .stat.done .n{color:#b9a6ff}
  .stat .l { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.7px; margin-top:7px; }

  h2 { font-size:11.5px; text-transform:uppercase; letter-spacing:1.4px; color:var(--muted); margin:30px 0 14px; font-weight:600; }

  .cards { display:grid; gap:15px; grid-template-columns:repeat(auto-fill, minmax(440px,1fr)); }
  .card { background:linear-gradient(180deg,var(--panel),var(--bg2)); border:1px solid var(--line);
    border-radius:16px; padding:18px 20px 16px; box-shadow:var(--shadow); animation:rise .4s ease both; }
  @keyframes rise { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }
  .card.active { border-color:rgba(110,168,254,.55); box-shadow:0 0 0 1px rgba(110,168,254,.35), var(--shadow); }
  .card .top { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .card .name { font-weight:700; font-size:16px; }
  .card .wf { color:var(--muted); font-size:11.5px; font-family:ui-monospace,monospace;
    background:var(--panel2); border:1px solid var(--line2); border-radius:6px; padding:2px 8px; }
  .star { color:var(--accent); }
  .badge { margin-left:auto; font-size:10.5px; padding:4px 11px; border-radius:999px; font-weight:700; letter-spacing:.5px; }
  .badge.work{background:rgba(63,208,122,.15);color:var(--work)} .badge.confirm{background:rgba(240,198,74,.15);color:var(--confirm)}
  .badge.done{background:rgba(154,123,255,.18);color:#b9a6ff} .badge.error{background:rgba(255,107,99,.15);color:var(--err)}

  .pipe { display:flex; align-items:flex-start; margin:6px 2px 14px; }
  .step { display:flex; align-items:center; flex:1; min-width:0; }
  .step:last-child { flex:0 0 auto; }
  .node { display:flex; flex-direction:column; align-items:center; gap:7px; width:46px; }
  .bub { width:30px; height:30px; border-radius:50%; display:grid; place-items:center; font-size:12.5px; font-weight:700;
    background:var(--panel2); border:2px solid var(--line2); color:var(--dim); transition:.3s; }
  .node.done .bub { background:linear-gradient(135deg,var(--work),#2fae63); border-color:transparent; color:#06210f; }
  .node.curr .bub { border-color:var(--accent); color:var(--accent); background:rgba(110,168,254,.08); animation:ring 2s infinite; }
  .node.curr.cf .bub { border-color:var(--confirm); color:var(--confirm); animation:ringc 2s infinite; }
  @keyframes ring { 0%{box-shadow:0 0 0 0 rgba(110,168,254,.5)} 70%{box-shadow:0 0 0 7px rgba(110,168,254,0)} 100%{box-shadow:0 0 0 0 rgba(110,168,254,0)} }
  @keyframes ringc { 0%{box-shadow:0 0 0 0 rgba(240,198,74,.5)} 70%{box-shadow:0 0 0 7px rgba(240,198,74,0)} 100%{box-shadow:0 0 0 0 rgba(240,198,74,0)} }
  .node .lbl { font-size:11px; color:var(--muted); white-space:nowrap; }
  .node.curr .lbl { color:var(--text); font-weight:600; }
  .node.done .lbl { color:#7fd6a3; }
  .bar { flex:1; height:3px; border-radius:2px; background:var(--line2); margin:0 3px; margin-top:13px; }
  .bar.done { background:linear-gradient(90deg,var(--work),#2fae63); }

  .foot { display:flex; gap:18px; flex-wrap:wrap; color:var(--muted); font-size:12px; border-top:1px solid var(--line); padding-top:11px; margin-top:2px; }
  .foot b { color:var(--text); font-weight:500; }
  .card.clickable { cursor:pointer; }

  .launch { display:flex; gap:10px; align-items:center; flex-wrap:wrap; background:var(--panel);
    border:1px solid var(--line); border-radius:14px; padding:14px 16px; box-shadow:var(--shadow); }
  .launch select, .launch input { font:inherit; color:var(--text); background:var(--panel2);
    border:1px solid var(--line2); border-radius:9px; padding:9px 12px; }
  .launch input { min-width:230px; }
  .launch button { font:inherit; font-weight:650; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#070a10;
    border:none; border-radius:9px; padding:9px 18px; cursor:pointer; }
  .launch button:hover { filter:brightness(1.07); }
  .launch .err { color:var(--err); font-size:12px; }
  .launch .intent { flex-basis:100%; color:var(--dim); font-size:12px; }

  .legend { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:12px; }
  .wf-chip { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 14px; }
  .wf-chip .id { font-weight:700; font-size:13.5px; display:flex; align-items:center; gap:7px; }
  .wf-chip .tag { font-size:10px; color:var(--dim); font-family:ui-monospace,monospace; border:1px solid var(--line2); border-radius:5px; padding:0 5px; }
  .wf-chip .it { color:var(--muted); font-size:12px; margin-top:5px; }
  .skills { color:var(--muted); font-size:12.5px; }
  .empty { color:var(--dim); font-style:italic; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">H</div>
    <div class="title">
      <h1>Hikspine 流水线看板</h1>
      <div class="t2">需求 → 设计 → 实现 → 验证 → 公司流程 · 一眼看清每个项目走到哪一步<span class="root" id="root"></span></div>
    </div>
    <div class="live"><span class="dot" id="dot"></span> <span id="livetext">实时 · 每 2 秒刷新</span></div>
  </header>

  <div class="stats" id="stats"></div>

  <h2>进行中的项目</h2>
  <div class="cards" id="changes"></div>

  <h2>启动一个项目</h2>
  <div class="launch">
    <select id="wf"></select>
    <input id="change" placeholder="项目标识 (kebab-case)" />
    <button id="go">启动</button>
    <span class="err" id="msg"></span>
    <div class="intent" id="intent"></div>
  </div>

  <h2>工作流</h2>
  <div class="legend" id="legend"></div>

  <h2>技能</h2>
  <div class="skills" id="skills"></div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const api = (p,o) => fetch(p,o).then(r=>r.json());

// Presentation labels for the builtin stage ids (engine ids stay English).
const STAGE = {
  open:'需求', inspect:'排查', design:'设计', scaffold:'脚手架',
  build:'实现', fix:'修复', review:'评审', verify:'验证', archive:'归档',
};
const label = (id) => STAGE[id] || id;

const WF_NAME = { new:'从 0 到 1', feature:'新需求', fix:'Bug / 轻量变动' };

// Demo data so the board looks alive even opened as a static file (no server).
const DEMO = {
  demo:true, root:'(demo) D:\\\\company\\\\pipeline', active:'门禁需求-v2',
  changes:[
    { change:'门禁需求-v2', workflow:'feature', active:true, nextAction:'confirm', complete:false,
      current:'design', goal:'探索技术路径并让用户确认方案', missing:['design_confirmed'],
      stages:['open','design','build','review','verify','archive'], stageIndex:1 },
    { change:'数据大屏', workflow:'new', active:false, nextAction:'work', complete:false,
      current:'build', goal:'实现已确认的设计', missing:['implemented'],
      stages:['open','design','scaffold','build','review','verify'], stageIndex:3 },
    { change:'登录超时', workflow:'fix', active:false, nextAction:'work', complete:false,
      current:'fix', goal:'应用最小修复', missing:['patched'],
      stages:['inspect','fix','verify'], stageIndex:1 },
    { change:'权限重构', workflow:'feature', active:false, nextAction:'done', complete:true,
      current:'archive', goal:'归档已完成的变更', missing:[],
      stages:['open','design','build','review','verify','archive'], stageIndex:5 },
  ],
  workflows:[
    { id:'new', intent:'从 0 到 1 新建项目，含脚手架。' },
    { id:'feature', intent:'已有代码库的新需求，需要设计与 OpenSpec 产物。' },
    { id:'fix', intent:'Bug 或轻量变动（含线上紧急修复），无需设计阶段。' },
  ],
  skills:new Array(70),
};

function pipe(c) {
  if (c.error || !Array.isArray(c.stages)) return '';
  let h = '<div class="pipe">';
  c.stages.forEach((id,i) => {
    const isDone = c.complete ? true : i < c.stageIndex;
    const isCurr = !c.complete && i === c.stageIndex;
    const cls = isDone ? 'done' : (isCurr ? 'curr '+(c.nextAction==='confirm'?'cf':'') : '');
    h += '<div class="step"><div class="node '+cls+'"><div class="bub">'+(isDone?'✓':(i+1))+'</div><div class="lbl">'+esc(label(id))+'</div></div>';
    if (i < c.stages.length-1) h += '<div class="bar '+(isDone?'done':'')+'"></div>';
    h += '</div>';
  });
  return h+'</div>';
}

function badge(c) {
  if (c.error) return '<span class="badge error">异常</span>';
  if (c.complete) return '<span class="badge done">完成</span>';
  return '<span class="badge '+c.nextAction+'">'+({work:'进行中',confirm:'待确认'}[c.nextAction]||c.nextAction)+'</span>';
}

function renderStats(changes) {
  const n = { work:0, confirm:0, done:0 };
  changes.forEach(c => { if (c.error) return; if (c.complete) n.done++; else n[c.nextAction]++; });
  $('stats').innerHTML =
    '<div class="stat total"><div class="n">'+changes.length+'</div><div class="l">项目总数</div></div>'+
    '<div class="stat work"><div class="n">'+n.work+'</div><div class="l">进行中</div></div>'+
    '<div class="stat confirm"><div class="n">'+n.confirm+'</div><div class="l">待用户确认</div></div>'+
    '<div class="stat done"><div class="n">'+n.done+'</div><div class="l">已完成</div></div>';
}

function renderChanges(changes, active) {
  if (!changes.length) { $('changes').innerHTML = '<div class="empty">还没有项目 — 在下方启动，或由 Agent 启动。</div>'; return; }
  $('changes').innerHTML = changes.map(c => {
    if (c.error) return '<div class="card"><div class="top"><span class="name">'+esc(c.change)+'</span>'+badge(c)+'</div><div class="foot">'+esc(c.error)+'</div></div>';
    const missing = (c.missing && c.missing.length) ? c.missing.join(', ') : '—';
    return '<div class="card clickable'+(c.active?' active':'')+'" data-change="'+esc(c.change)+'">'+
      '<div class="top">'+(c.active?'<span class="star">★</span>':'')+'<span class="name">'+esc(c.change)+'</span>'+
      '<span class="wf">'+esc(c.workflow)+'</span>'+badge(c)+'</div>'+
      pipe(c)+
      '<div class="foot"><span>当前 <b>'+esc(label(c.current))+'</b></span>'+
      (c.goal?'<span>'+esc(c.goal)+'</span>':'')+
      '<span>待办决策 <b>'+esc(missing)+'</b></span></div></div>';
  }).join('');
  $('changes').querySelectorAll('.card.clickable').forEach(card => {
    card.onclick = async () => { try { await api('/api/active',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({change:card.dataset.change})}); } catch(e){} refresh(); };
  });
}

function renderWorkflows(workflows) {
  const sel = $('wf'), prev = sel.value;
  sel.innerHTML = workflows.map(w=>'<option value="'+esc(w.id)+'">'+esc(w.id)+(WF_NAME[w.id]?' · '+WF_NAME[w.id]:'')+'</option>').join('');
  if (workflows.some(w=>w.id===prev)) sel.value = prev;
  const showIntent = () => { const w = workflows.find(x=>x.id===sel.value); $('intent').textContent = w?w.intent:''; };
  sel.onchange = showIntent; showIntent();
  $('legend').innerHTML = workflows.map(w=>'<div class="wf-chip"><div class="id">'+esc(w.id)+
    (WF_NAME[w.id]?'<span class="tag">'+WF_NAME[w.id]+'</span>':'')+'</div><div class="it">'+esc(w.intent||'')+'</div></div>').join('');
}

async function refresh() {
  let s, demo=false;
  try { s = await api('/api/state'); } catch (e) { s = DEMO; demo = true; }
  if (s && s.demo) demo = true;
  $('root').textContent = s.root ? '  ·  '+s.root : '';
  $('dot').className = 'dot' + (demo?' demo':'');
  $('livetext').textContent = demo ? '示例数据 · 启动 hikspine ui 看真实状态' : '实时 · 每 2 秒刷新';
  renderStats(s.changes);
  renderChanges(s.changes, s.active);
  renderWorkflows(s.workflows);
  $('skills').textContent = (s.skills?s.skills.length:0) + ' 个可发现技能（每个阶段的 capabilities 从中挑选）';
}

$('go').onclick = async () => {
  $('msg').textContent = '';
  const change = $('change').value.trim();
  if (!change) { $('msg').textContent = '请输入项目标识。'; return; }
  try {
    const r = await api('/api/launch',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({change,workflow:$('wf').value})});
    if (r.error) { $('msg').textContent = r.error; return; }
    $('change').value=''; refresh();
  } catch (e) { $('msg').textContent = '启动需要运行中的看板服务 (hikspine ui)。'; }
};

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
